<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Professional Trading Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .input-glass {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }
        
        .input-glass:focus {
            background: rgba(255, 255, 255, 1);
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .tab-active {
            border-bottom: 2px solid #667eea;
            color: #667eea;
            font-weight: 600;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div id="auth-screen" class="w-full max-w-md">
        <!-- Brand -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-white/20 backdrop-blur-md mb-4">
                <i class="fas fa-chart-line text-3xl text-white"></i>
            </div>
            <h1 class="text-4xl font-bold text-white mb-2">Pipways</h1>
            <p class="text-white/80">Professional Trading Platform</p>
        </div>
        
        <!-- Auth Card -->
        <div class="glass-card rounded-2xl p-8">
            <!-- Alert -->
            <div id="auth-error" class="hidden mb-4 p-4 rounded-lg bg-red-50 border border-red-200 text-red-700 text-sm"></div>
            
            <!-- Tabs -->
            <div class="flex mb-6 border-b border-gray-200">
                <button onclick="switchTab('login')" id="tab-login" class="flex-1 pb-3 tab-active transition-colors cursor-pointer">Login</button>
                <button onclick="switchTab('register')" id="tab-register" class="flex-1 pb-3 text-gray-500 hover:text-gray-700 transition-colors cursor-pointer">Sign Up</button>
            </div>
            
            <!-- Login Form -->
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="login-email" required
                            class="input-glass w-full px-4 py-3 rounded-lg text-gray-900">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="login-password" required
                            class="input-glass w-full px-4 py-3 rounded-lg text-gray-900">
                    </div>
                    <button type="submit" class="gradient-btn w-full py-3 rounded-lg text-white font-semibold shadow-lg cursor-pointer">
                        <i class="fas fa-sign-in-alt mr-2"></i> Sign In
                    </button>
                </div>
            </form>
            
            <!-- Register Form -->
            <form id="register-form" onsubmit="handleRegister(event)" class="hidden">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                        <input type="email" id="reg-email" required
                            class="input-glass w-full px-4 py-3 rounded-lg text-gray-900">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" id="reg-password" required minlength="8"
                            class="input-glass w-full px-4 py-3 rounded-lg text-gray-900">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                        <input type="text" id="reg-name" placeholder="John Doe"
                            class="input-glass w-full px-4 py-3 rounded-lg text-gray-900">
                    </div>
                    <button type="submit" class="w-full py-3 rounded-lg text-white font-semibold shadow-lg cursor-pointer bg-gradient-to-r from-green-500 to-teal-500 hover:from-green-600 hover:to-teal-600 transition-all">
                        <i class="fas fa-user-plus mr-2"></i> Create Account
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Check existing auth
        if (localStorage.getItem('pipways_token')) {
            window.location.href = '/dashboard.html';
        }
        
        function switchTab(tab) {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            const tabLogin = document.getElementById('tab-login');
            const tabRegister = document.getElementById('tab-register');
            
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
                tabLogin.classList.add('tab-active');
                tabLogin.classList.remove('text-gray-500');
                tabRegister.classList.remove('tab-active');
                tabRegister.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                tabLogin.classList.remove('tab-active');
                tabLogin.classList.add('text-gray-500');
                tabRegister.classList.add('tab-active');
                tabRegister.classList.remove('text-gray-500');
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('auth-error');
            if (errorDiv) {
                errorDiv.textContent = message;
                errorDiv.classList.remove('hidden');
                setTimeout(() => errorDiv.classList.add('hidden'), 5000);
            }
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('login-email')?.value;
            const password = document.getElementById('login-password')?.value;
            
            if (!email || !password) {
                showError('Please fill in all fields');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const res = await fetch(`${window.location.origin}/auth/token`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Login failed');
                }
                
                const data = await res.json();
                localStorage.setItem('pipways_token', data.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(data.user));
                window.location.href = '/dashboard.html';
                
            } catch (e) {
                showError(e.message);
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            
            const email = document.getElementById('reg-email')?.value;
            const password = document.getElementById('reg-password')?.value;
            const full_name = document.getElementById('reg-name')?.value;
            
            if (!email || !password) {
                showError('Please fill in required fields');
                return;
            }
            
            try {
                const res = await fetch(`${window.location.origin}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, full_name: full_name || '' })
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Registration failed');
                }
                
                const result = await res.json();
                localStorage.setItem('pipways_token', result.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(result.user));
                window.location.href = '/dashboard.html';
                
            } catch (e) {
                showError(e.message);
            }
        }
    </script>
</body>
</html>
