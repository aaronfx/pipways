<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pipways</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <a href="#/dashboard">Pipways</a>
        </div>
        <div class="nav-links">
            <a href="#/dashboard">Home</a>
            <a href="#/signals">Signals</a>
            <a href="#/courses">Courses</a>
            <a href="#/blog">Blog</a>
            <a href="#/webinars">Webinars</a>
            <div class="dropdown">
                <a href="#/ai-tools" class="dropbtn">AI Tools ▼</a>
                <div class="dropdown-content">
                    <a href="#/ai-mentor">AI Mentor</a>
                    <a href="#/chart-analysis">Chart Analysis</a>
                    <a href="#/performance">Performance</a>
                </div>
            </div>
            <a href="#/dashboard" id="dashboardLink">Dashboard</a>
            <a href="#/admin" id="adminLink" style="display:none">Admin</a>
        </div>
        <div class="nav-user">
            <span id="userEmail"></span>
            <button onclick="logout()" class="btn btn-secondary">Logout</button>
        </div>
    </nav>

    <main id="app"></main>

    <!-- Core -->
    <script src="/static/js/store.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/router.js"></script>
    
    <!-- Modules -->
    <script src="/static/js/modules/dashboard.js"></script>
    <script src="/static/js/modules/signals.js"></script>
    <script src="/static/js/modules/courses.js"></script>
    <script src="/static/js/modules/blog.js"></script>
    <script src="/static/js/modules/webinars.js"></script>
    <script src="/static/js/modules/ai_mentor.js"></script>
    <script src="/static/js/modules/chart_analysis.js"></script>
    <script src="/static/js/modules/performance.js"></script>
    <script src="/static/js/modules/admin.js"></script>
    <script src="/static/js/modules/risk_calculator.js"></script>
    
    <script>
        // Check auth
        if (!localStorage.getItem('pipways_token')) {
            window.location.href = '/';
        }
        
        // Display user
        const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
        document.getElementById('userEmail').textContent = user.email || '';
        if (user.is_admin) {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
        
        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            window.location.href = '/';
        }
        
        // Initialize router when DOM ready
        document.addEventListener('DOMContentLoaded', () => {
            Router.init();
        });
    </script>
</body>
</html>
