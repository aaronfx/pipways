# Render Blueprint for Pipways Trading Platform
# Version: 2.0.0

services:
  # Main Web Service - Serves both Frontend and API
  - type: web
    name: pipways-web
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      echo "Build completed successfully"

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString

      - key: SECRET_KEY
        generateValue: true

      - key: OPENROUTER_API_KEY
        sync: false  # You'll set this manually in dashboard

      - key: ENVIRONMENT
        value: production

      - key: STATIC_DIR
        value: static

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 1440  # 24 hours

      - key: MAX_FILE_SIZE
        value: 10485760  # 10MB

    # Auto-deploy on git push
    autoDeploy: true

    # Custom domains (optional - add your own domain later)
    # domains:
    #   - pipways.com
    #   - www.pipways.com

  # Background Worker for AI Analysis (optional but recommended)
  # Uncomment if you want to offload heavy AI processing
  # - type: worker
  #   name: pipways-worker
  #   runtime: python
  #   region: oregon
  #   plan: starter  # Paid plan recommended for workers
  #   
  #   buildCommand: pip install -r requirements.txt
  #   startCommand: python worker.py
  #   
  #   envVars:
  #     - key: DATABASE_URL
  #       fromDatabase:
  #         name: pipways-db
  #         property: connectionString
  #     
  #     - key: OPENROUTER_API_KEY
  #       sync: false
  #     
  #     - key: REDIS_URL
  #       fromService:
  #         type: redis
  #         name: pipways-redis
  #         property: connectionString

  # Redis Cache for Session Management & Rate Limiting (optional)
  # - type: redis
  #   name: pipways-redis
  #   region: oregon
  #   plan: free
  #   ipAllowList: []  # Allow all (restrict in production)

databases:
  # PostgreSQL Database
  - name: pipways-db
    region: oregon
    plan: free
    postgresMajorVersion: "15"

    # Database will be created with these defaults
    # You can upgrade plan later as you grow

