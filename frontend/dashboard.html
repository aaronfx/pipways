<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways Trading Platform</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .nav-dropdown { position: relative; display: inline-block; }
        .dropdown-content { 
            display: none; 
            position: absolute; 
            background: white; 
            min-width: 200px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            z-index: 1000;
            border-radius: 0.5rem;
            margin-top: 0.5rem;
        }
        .dropdown-content a { 
            color: #374151; 
            padding: 0.75rem 1rem; 
            display: block; 
            text-decoration: none;
            border-bottom: 1px solid #f3f4f6;
        }
        .dropdown-content a:hover { background: #f9fafb; }
        .dropdown-content a:last-child { border-bottom: none; }
        .nav-dropdown:hover .dropdown-content { display: block; }
        .nav-link:hover { color: #3b82f6; }
    </style>
</head>
<body>
    <nav id="navbar" class="navbar" style="background: #1e293b; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center;">
        <div class="nav-brand">
            <h1 style="margin: 0; color: #3b82f6;">Pipways</h1>
        </div>
        <div class="nav-links" id="navLinks" style="display: flex; gap: 2rem; align-items: center;">
            <a href="#/" class="nav-link" style="color: white; text-decoration: none;">Home</a>
            <a href="#/signals" class="nav-link" style="color: white; text-decoration: none;">Signals</a>
            <a href="#/courses" class="nav-link" style="color: white; text-decoration: none;">Courses</a>
            <a href="#/blog" class="nav-link" style="color: white; text-decoration: none;">Blog</a>
            <a href="#/webinars" class="nav-link" style="color: white; text-decoration: none;">Webinars</a>
            
            <div class="nav-dropdown">
                <a href="#" class="nav-link" style="color: white; text-decoration: none;">AI Tools ▼</a>
                <div class="dropdown-content">
                    <a href="#/ai/mentor">🎓 AI Mentor</a>
                    <a href="#/ai/chart-analysis">📊 Chart Analysis</a>
                    <a href="#/ai/performance">📈 Performance</a>
                </div>
            </div>
            
            <a href="#/dashboard" class="nav-link" id="dashboardLink" style="color: white; text-decoration: none;">Dashboard</a>
            <a href="#/admin" class="nav-link" id="adminLink" style="color: white; text-decoration: none; display:none;">Admin</a>
        </div>
        <div class="nav-auth" id="authSection" style="display: flex; align-items: center; gap: 1rem;">
            <div id="userMenu" style="display:flex; align-items: center; gap: 1rem;">
                <span id="userName" style="color: #cbd5e1;"></span>
                <button id="logoutBtn" class="btn btn-text" style="background: transparent; color: white; border: 1px solid #475569; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer;">Logout</button>
            </div>
        </div>
    </nav>

    <main id="app" class="container" style="padding: 2rem; max-width: 1200px; margin: 0 auto;"></main>

    <div id="toastContainer" class="toast-container" style="position: fixed; bottom: 2rem; right: 2rem; z-index: 9999;"></div>
    <div id="loadingSpinner" class="spinner-overlay" style="display:none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9998; justify-content: center; align-items: center;">
        <div class="spinner" style="width: 50px; height: 50px; border: 4px solid #f3f4f6; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
    </div>

    <!-- Core Modules -->
    <script src="/static/js/store.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/router.js"></script>

    <!-- Feature Modules -->
    <script src="/static/js/modules/signals.js"></script>
    <script src="/static/js/modules/courses.js"></script>
    <script src="/static/js/modules/blog.js"></script>
    <script src="/static/js/modules/webinars.js"></script>
    <script src="/static/js/modules/dashboard.js"></script>
    <script src="/static/js/modules/admin.js"></script>
    <script src="/static/js/modules/risk_calculator.js"></script>
    <script src="/static/js/modules/blog_enhanced.js"></script>
    <script src="/static/js/modules/quiz.js"></script>
    <script src="/static/js/modules/notifications.js"></script>
    
    <!-- AI Modules -->
    <script src="/static/js/modules/ai_mentor.js"></script>
    <script src="/static/js/modules/chart_analysis.js"></script>
    <script src="/static/js/modules/performance.js"></script>

    <script>
        // Auth guard - redirect to login if not authenticated
        (function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = '/index.html';
                return;
            }
            
            const userData = localStorage.getItem('user');
            const user = userData ? JSON.parse(userData) : {};
            
            const isAdmin = user.is_admin || user.role === 'admin' || user.role === 'moderator';
            
            if (isAdmin) {
                const adminLink = document.getElementById('adminLink');
                if (adminLink) adminLink.style.display = 'inline';
            }
            
            if (window.location.hash.includes('admin') && !isAdmin) {
                window.location.hash = '#/dashboard';
                alert('Admin access required');
            }
            
            const userNameEl = document.getElementById('userName');
            if (userNameEl) userNameEl.textContent = user.email || user.username || 'User';
            
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = '/index.html';
            });
        })();
    </script>

    <script src="/static/js/app.js"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</body>
</html>
