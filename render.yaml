services:
  - type: web
    name: pipways-api-nhem
    runtime: python
    region: oregon
    plan: standard
    branch: main
    
    buildCommand: pip install -r requirements.txt
    
    # CORRECT - no "startCommand:" prefix, just the command
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    
    healthCheckPath: /health
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db-nhem
          property: connectionString
      
      - key: SECRET_KEY
        generateValue: true
      
      - key: OPENROUTER_API_KEY
        sync: false
      
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: pipways-db-nhem
    region: oregon
    plan: standard
