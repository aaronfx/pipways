<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pipways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f3f4f6; 
            overflow-x: hidden;
        }
        
        .sidebar {
            background: #1e293b;
            transition: transform 0.3s ease;
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
            border-radius: 0.5rem;
            margin: 0.25rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5e1;
            text-decoration: none;
            cursor: pointer;
        }
        
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .sidebar-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        
        .sidebar-overlay.active { display: block; }
        
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }
            .sidebar.mobile-open { transform: translateX(0); }
        }
        
        .feature-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .feature-card:hover {
            transform: translateY(-4px) scale(1.02);
        }
        
        .feature-icon {
            transition: all 0.3s ease;
        }
        
        .feature-card:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .spinner.small {
            width: 20px;
            height: 20px;
            border-width: 2px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast {
            animation: slideIn 0.3s ease-out;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        @media (hover: none) {
            .sidebar-link:hover { background: transparent; }
            .sidebar-link:active { background: rgba(255, 255, 255, 0.1); }
            .feature-card:hover { transform: none; }
            .feature-card:active { transform: scale(0.98); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay lg:hidden" onclick="toggleMobileSidebar()"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-64 flex flex-col text-white flex-shrink-0 overflow-y-auto">
        <div class="p-6 border-b border-white/10 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-400 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Pipways</h1>
                    <p class="text-xs text-gray-400">Pro Trading</p>
                </div>
            </div>
            <button onclick="toggleMobileSidebar()" class="lg:hidden text-gray-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Main</div>
            
            <a onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-link active">
                <i class="fas fa-home w-5 text-center"></i>
                <span>Dashboard</span>
            </a>
            
            <a onclick="showPage('signals')" id="nav-signals" class="sidebar-link">
                <i class="fas fa-signal w-5 text-center"></i>
                <span>Trading Signals</span>
            </a>
            
            <a onclick="showPage('journal')" id="nav-journal" class="sidebar-link">
                <i class="fas fa-book w-5 text-center"></i>
                <span>Trading Journal</span>
            </a>
            
            <a onclick="showPage('analysis')" id="nav-analysis" class="sidebar-link">
                <i class="fas fa-chart-pie w-5 text-center"></i>
                <span>Chart Analysis</span>
            </a>
            
            <a onclick="showPage('trade-analysis')" id="nav-trade-analysis" class="sidebar-link">
                <i class="fas fa-chart-line w-5 text-center"></i>
                <span>Performance</span>
            </a>
            
            <a onclick="showPage('mentor')" id="nav-mentor" class="sidebar-link">
                <i class="fas fa-robot w-5 text-center"></i>
                <span>AI Mentor</span>
            </a>
            
            <a onclick="showPage('courses')" id="nav-courses" class="sidebar-link">
                <i class="fas fa-graduation-cap w-5 text-center"></i>
                <span>Courses</span>
            </a>
            
            <a onclick="showPage('webinars')" id="nav-webinars" class="sidebar-link">
                <i class="fas fa-video w-5 text-center"></i>
                <span>Webinars</span>
            </a>
            
            <a onclick="showPage('blog')" id="nav-blog" class="sidebar-link">
                <i class="fas fa-newspaper w-5 text-center"></i>
                <span>Blog</span>
            </a>
            
            <!-- Admin Section - Hidden by default -->
            <div id="admin-nav-section" class="hidden">
                <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Administration</div>
                <a onclick="showPage('admin')" id="nav-admin" class="sidebar-link">
                    <i class="fas fa-shield-alt w-5 text-center"></i>
                    <span>Admin Dashboard</span>
                </a>
            </div>
        </nav>
        
        <div class="p-4 border-t border-white/10 mt-auto">
            <div class="flex items-center gap-3 mb-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-white font-semibold">
                    U
                </div>
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-sm font-medium truncate">User</p>
                    <p id="user-email" class="text-xs text-gray-400 truncate">user@pipways.com</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-300 hover:bg-red-500/30 transition-colors text-sm font-medium cursor-pointer">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 sm:px-8 py-4 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 text-gray-600">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div>
                    <h2 id="page-title" class="text-xl sm:text-2xl font-bold text-gray-800">Dashboard</h2>
                    <p class="text-sm text-gray-500 hidden sm:block">Professional Trading Platform</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="system-status" class="glass-card px-3 sm:px-4 py-2 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs sm:text-sm font-medium text-gray-700 hidden sm:inline">System Online</span>
                </div>
            </div>
        </header>
        
        <!-- Dynamic Content -->
        <main id="content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
            <!-- Content injected by JavaScript -->
        </main>
    </div>
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // ==========================================
        // CONFIGURATION
        // ==========================================
        const API_BASE = window.location.origin;
        let currentPage = 'dashboard';
        let currentUser = null;
        let chartInstances = {};
        
        // ==========================================
        // NAVIGATION & UI
        // ==========================================
        
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
        
        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            window.location.href = '/';
        }
        
        function showPage(page) {
            currentPage = page;
            
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
            
            document.querySelectorAll('.sidebar-link').forEach(el => el.classList.remove('active'));
            document.getElementById('nav-' + page)?.classList.add('active');
            
            const titles = {
                'dashboard': 'Dashboard',
                'signals': 'Trading Signals',
                'journal': 'Trading Journal',
                'analysis': 'Chart Analysis',
                'trade-analysis': 'Performance Analytics',
                'courses': 'Trading Courses',
                'webinars': 'Live Webinars',
                'mentor': 'AI Mentor',
                'blog': 'Trading Blog',
                'admin': 'Admin Dashboard'
            };
            document.getElementById('page-title').textContent = titles[page] || page;
            
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="flex items-center justify-center h-64">
                    <div class="spinner"></div>
                </div>
            `;
            
            const renderers = {
                'dashboard': renderDashboard,
                'signals': renderSignals,
                'journal': renderJournal,
                'analysis': renderChartAnalysis,
                'trade-analysis': renderTradeAnalysis,
                'courses': renderCourses,
                'webinars': renderWebinars,
                'mentor': renderMentor,
                'blog': renderBlog,
                'admin': renderAdmin
            };
            
            if (renderers[page]) {
                renderers[page]();
            } else {
                renderDashboard();
            }
        }
        
        // ==========================================
        // API CLIENT
        // ==========================================
        
        const API = {
            async request(endpoint, options = {}) {
                const token = localStorage.getItem('pipways_token');
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                };
                
                if (options.body instanceof FormData) {
                    delete headers['Content-Type'];
                }
                
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `Error ${res.status}`);
                }
                
                return res.json();
            },
            
            getSignals(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/signals/active?${qs}`);
            },
            
            getCourses() {
                return this.request('/courses/list');
            },
            
            getWebinars(upcoming = true) {
                return this.request(`/webinars/upcoming?upcoming=${upcoming}`);
            },
            
            getBlogPosts(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/blog/posts?${qs}`);
            },
            
            askMentor(question, skillLevel = 'intermediate') {
                return this.request('/ai/mentor/ask', {
                    method: 'POST',
                    body: JSON.stringify({ question, skill_level: skillLevel })
                });
            },
            
            analyzeChart(file, symbol, timeframe) {
                const formData = new FormData();
                formData.append('file', file);
                if (symbol) formData.append('symbol', symbol);
                if (timeframe) formData.append('timeframe', timeframe);
                
                return fetch(`${API_BASE}/ai/chart/analyze`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('pipways_token')}` },
                    body: formData
                }).then(r => {
                    if (!r.ok) throw new Error('Analysis failed');
                    return r.json();
                });
            },
            
            analyzeJournal(trades) {
                return this.request('/ai/performance/analyze-journal', {
                    method: 'POST',
                    body: JSON.stringify(trades)
                });
            },
            
            uploadJournalFile(file) {
                const formData = new FormData();
                formData.append('file', file);
                return fetch(`${API_BASE}/ai/performance/analyze-journal`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('pipways_token')}` },
                    body: formData
                }).then(r => {
                    if (!r.ok) throw new Error('Upload failed');
                    return r.json();
                });
            },
            
            getPerformanceStats(days = 30) {
                return this.request(`/ai/performance/dashboard-stats?days=${days}`);
            },
            
            getAdminStats() {
                return this.request('/admin/users');
            }
        };
        
        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = {
                success: 'border-green-500 text-green-800 bg-white',
                error: 'border-red-500 text-red-800 bg-white',
                warning: 'border-yellow-500 text-yellow-800 bg-white',
                info: 'border-blue-500 text-blue-800 bg-white'
            };
            
            toast.className = `toast border-l-4 ${colors[type]} p-4 rounded shadow-lg min-w-[300px] flex justify-between items-center`;
            toast.innerHTML = `
                <span class="font-medium">${message}</span>
                <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-gray-600 ml-4">
                    <i class="fas fa-times"></i>
                </button>
            `;
            
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000);
        }
        
        function checkAdminAccess() {
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            const isAdmin = user.role === 'admin' || user.role === 'moderator' || user.is_admin === true;
            
            if (isAdmin) {
                document.getElementById('admin-nav-section')?.classList.remove('hidden');
            }
        }
        
        // ==========================================
        // PAGE RENDERERS
        // ==========================================
        
        function renderDashboard() {
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            
            document.getElementById('content').innerHTML = `
                <div class="space-y-8 max-w-7xl mx-auto">
                    <div class="glass-card rounded-2xl p-6 sm:p-8 bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 text-white shadow-lg">
                        <h3 class="text-2xl sm:text-3xl font-bold mb-2">Welcome back, ${user.full_name || user.email || 'Trader'}!</h3>
                        <p class="text-blue-100">Your professional trading command center</p>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                        ${renderFeatureCard('signals', 'Trading Signals', 'Real-time buy/sell signals', 'fa-signal', 'blue')}
                        ${renderFeatureCard('mentor', 'AI Mentor', '24/7 trading guidance', 'fa-robot', 'purple')}
                        ${renderFeatureCard('analysis', 'Chart Analysis', 'AI-powered pattern recognition', 'fa-chart-pie', 'green')}
                        ${renderFeatureCard('journal', 'Trading Journal', 'Track and analyze trades', 'fa-book', 'orange')}
                        ${renderFeatureCard('trade-analysis', 'Performance', 'Detailed analytics', 'fa-chart-line', 'red')}
                        ${renderFeatureCard('courses', 'Courses', 'Professional training', 'fa-graduation-cap', 'teal')}
                        ${renderFeatureCard('webinars', 'Webinars', 'Live sessions', 'fa-video', 'pink')}
                        ${renderFeatureCard('blog', 'Blog', 'Market insights', 'fa-newspaper', 'indigo')}
                    </div>
                    
                    <div class="glass-card rounded-xl p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-gray-800">Recent Signals</h3>
                            <button onclick="showPage('signals')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                                View All <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div id="recent-signals-list" class="space-y-3">
                            <div class="spinner mx-auto"></div>
                        </div>
                    </div>
                </div>
            `;
            
            loadRecentSignals();
        }
        
        function renderFeatureCard(page, title, desc, icon, color) {
            const colors = {
                blue: 'border-blue-500 hover:bg-blue-50',
                purple: 'border-purple-500 hover:bg-purple-50',
                green: 'border-green-500 hover:bg-green-50',
                orange: 'border-orange-500 hover:bg-orange-50',
                red: 'border-red-500 hover:bg-red-50',
                teal: 'border-teal-500 hover:bg-teal-50',
                pink: 'border-pink-500 hover:bg-pink-50',
                indigo: 'border-indigo-500 hover:bg-indigo-50'
            };
            
            return `
                <div onclick="showPage('${page}')" class="glass-card rounded-xl p-6 cursor-pointer border-l-4 ${colors[color]} transition-all hover:-translate-y-1 hover:shadow-lg group">
                    <div class="flex items-start justify-between mb-4">
                        <div class="w-12 h-12 rounded-lg bg-${color}-100 flex items-center justify-center text-${color}-600 group-hover:scale-110 transition-transform">
                            <i class="fas ${icon} text-xl"></i>
                        </div>
                    </div>
                    <h4 class="font-bold text-gray-800 mb-1">${title}</h4>
                    <p class="text-sm text-gray-600">${desc}</p>
                </div>
            `;
        }
        
        async function loadRecentSignals() {
            try {
                const signals = await API.getSignals({ limit: 5 });
                const container = document.getElementById('recent-signals-list');
                
                if (!signals || signals.length === 0) {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">No active signals available</p>';
                    return;
                }
                
                container.innerHTML = signals.slice(0, 3).map(s => `
                    <div onclick="showPage('signals')" class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-lg border-l-4 ${s.direction === 'BUY' ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'} hover:shadow-md transition-shadow cursor-pointer">
                        <div class="mb-2 sm:mb-0">
                            <div class="flex items-center gap-2">
                                <strong class="text-lg text-gray-800">${s.symbol}</strong>
                                <span class="px-2 py-1 rounded text-xs font-bold ${s.direction === 'BUY' ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}">${s.direction}</span>
                            </div>
                            <div class="text-sm text-gray-600 mt-1">
                                Entry: ${s.entry_price} | SL: ${s.stop_loss} | TP: ${s.take_profit}
                            </div>
                        </div>
                        <div class="text-right text-sm text-gray-500">
                            ${new Date(s.created_at).toLocaleDateString()}
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('recent-signals-list').innerHTML = `
                    <p class="text-red-500 text-center py-4">Failed to load signals: ${e.message}</p>
                `;
            }
        }
        
        async function renderSignals() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="max-w-6xl mx-auto">
                    <div class="glass-card rounded-xl p-6 sm:p-8">
                        <div class="flex justify-between items-center mb-6">
                            <h3 class="text-xl sm:text-2xl font-bold text-gray-800">Active Trading Signals</h3>
                            <button onclick="renderSignals()" class="text-blue-600 hover:text-blue-800 text-sm">
                                <i class="fas fa-sync-alt mr-1"></i> Refresh
                            </button>
                        </div>
                        <div id="signals-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div class="col-span-full flex justify-center py-12">
                                <div class="spinner"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            try {
                const signals = await API.getSignals();
                const grid = document.getElementById('signals-grid');
                
                if (!signals || signals.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12 text-gray-500">
                            <i class="fas fa-signal text-4xl mb-4 text-gray-300"></i>
                            <p>No active signals available</p>
                            <p class="text-sm mt-2">Check back later for new opportunities</p>
                        </div>
                    `;
                    return;
                }
                
                grid.innerHTML = signals.map(s => `
                    <div class="glass-card rounded-xl p-6 border-t-4 ${s.direction === 'BUY' ? 'border-green-500' : 'border-red-500'}">
                        <div class="flex justify-between items-center mb-4">
                            <h4 class="text-xl font-bold text-gray-800">${s.symbol}</h4>
                            <span class="px-3 py-1 rounded-full text-sm font-bold ${s.direction === 'BUY' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}">
                                ${s.direction}
                            </span>
                        </div>
                        <div class="space-y-2 text-sm">
                            <div class="flex justify-between"><span class="text-gray-600">Entry:</span><span class="font-semibold">${s.entry_price}</span></div>

        function askMentor(question) {
            const input = document.getElementById('mentorInput');
            if (!input) return;

        }
        
        async function sendMentorMessage() {
            const input = document.getElementById('mentorInput');
            const container = document.getElementById('mentor-messages');
            const loadingEl = document.getElementById('mentor-loading');
            const sendBtn = document.getElementById('mentor-send-btn');
            
            if (!input || !container) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            container.innerHTML += `
                <div class="flex gap-3 flex-row-reverse">
                    <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 text-sm flex-shrink-0">
                        <i class="fas fa-user"></i>
                    </div>
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[85%] sm:max-w-[80%]">
                        <p class="text-white">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
            
            input.value = '';
            container.scrollTop = container.scrollHeight;
            
            loadingEl?.classList.remove('hidden');
            if (sendBtn) sendBtn.disabled = true;
            
            try {
                const response = await API.askMentor(message);
                
                container.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-sm flex-shrink-0">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[85%] sm:max-w-[80%]">
                            <p class="text-gray-800 whitespace-pre-wrap">${escapeHtml(response.response)}</p>
                            ${response.suggested_resources?.length ? `
                                <div class="mt-3 pt-2 border-t border-gray-100">
                                    <p class="text-xs text-gray-500 mb-1">Suggested resources:</p>
                                    <div class="flex flex-wrap gap-1">
                                        ${response.suggested_resources.map(r => `
                                            <span class="text-xs bg-blue-50 text-blue-600 px-2 py-1 rounded">${r}</span>
                                        `).join('')}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.scrollTop = container.scrollHeight;
                
            } catch (e) {
                container.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white text-sm flex-shrink-0">
                            <i class="fas fa-exclamation"></i>
                        </div>
                        <div class="bg-red-50 p-3 rounded-2xl rounded-tl-none border border-red-100 max-w-[80%]">
                            <p class="text-red-700 text-sm">Sorry, I couldn't process your request. ${e.message}</p>
                        </div>
                    </div>
                `;
                container.scrollTop = container.scrollHeight;
            } finally {
                loadingEl?.classList.add('hidden');
                if (sendBtn) sendBtn.disabled = false;
            }
        }

                document.getElementById('admin-course-count').textContent = stats.total_courses || '--';
                
                if (stats.recent_users) {
                    document.getElementById('admin-users-list').innerHTML = stats.recent_users.map(u => `
                        <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 text-sm">
                                    ${u.email[0].toUpperCase()}
                                </div>
                                <div>
                                    <p class="text-sm font-semibold text-gray-800">${u.email}</p>
                                    <p class="text-xs text-gray-500">${u.role || 'user'}</p>
                                </div>
                            </div>
                            <span class="text-xs text-gray-400">${new Date(u.created_at).toLocaleDateString()}</span>
                        </div>
                    `).join('');
                } else {
                    document.getElementById('admin-users-list').innerHTML = '<p class="text-gray-500 text-center py-4">No recent user data</p>';
                }
            } catch (e) {
                console.error('Failed to load admin stats:', e);
                document.getElementById('admin-users-list').innerHTML = '<p class="text-red-500 text-center py-4">Failed to load users</p>';
            }
        }
        
        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('pipways_token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            currentUser = user;
            
            if (user.email) {
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('user-name').textContent = user.full_name || user.email.split('@')[0];
                document.getElementById('user-avatar').textContent = (user.full_name || user.email)[0].toUpperCase();
                
                checkAdminAccess();
            }
            
            showPage('dashboard');
            
            fetch(`${API_BASE}/health`)
                .then(r => r.ok ? r.json() : null)
                .then(data => {
                    if (data && data.status !== 'healthy') {
                        const statusEl = document.getElementById('system-status');
                        if (statusEl) {
                            statusEl.innerHTML = '<div class="w-2 h-2 rounded-full bg-yellow-500"></div><span class="text-xs sm:text-sm font-medium text-yellow-700">Degraded</span>';
                        }
                    }
                })
                .catch(() => {});
        });
    </script>
</body>
</html>
