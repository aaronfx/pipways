services:
  - type: web
    name: pipways-web
    runtime: python
    region: oregon
    plan: starter
    branch: main

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2  # ← REQUIRED!

    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0

      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString

databases:
  - name: pipways-db
    region: oregon
    plan: starter
    postgresMajorVersion: "15"
