services:
  - type: web
    name: pipways-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      # AI Configuration (OpenRouter)
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_MODEL
        value: "anthropic/claude-3.5-sonnet"
      - key: OPENROUTER_VISION_MODEL
        value: "anthropic/claude-3.5-sonnet"
      # Optional: Legacy support (remove if not needed)
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "*"
    healthCheckPath: /health

databases:
  - name: pipways-db
    databaseName: pipways
    plan: standard
    ipAllowList: []
