<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Signals - Pipways</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            border: 1px solid #334155;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #334155;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
            border-color: #60a5fa;
        }
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #60a5fa;
        }
        .stat-label {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .filters {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        select, input {
            background: #1e293b;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
            min-width: 150px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        .signals-grid {
            display: grid;
            gap: 20px;
        }
        .signal-card {
            background: #1e293b;
            border-radius: 16px;
            border: 1px solid #334155;
            overflow: hidden;
            transition: all 0.3s;
        }
        .signal-card:hover {
            border-color: #475569;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .signal-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .pair-badge {
            font-size: 1.5rem;
            font-weight: bold;
            color: #f8fafc;
        }
        .signal-type {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
        }
        .signal-type.buy {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
            border: 1px solid #22c55e;
        }
        .signal-type.sell {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .signal-body {
            padding: 20px;
        }
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .price-item {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .price-label {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }
        .price-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: #f8fafc;
        }
        .price-value.tp1 { color: #22c55e; }
        .price-value.tp2 { color: #22c55e; }
        .price-value.sl { color: #ef4444; }
        .signal-meta {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #334155;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-active {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        .status-tp1 {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }
        .status-tp2 {
            background: rgba(34, 197, 94, 0.3);
            color: #16a34a;
        }
        .status-sl {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .status-closed {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }
        .rr-badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .analysis-section {
            margin-top: 15px;
            padding: 15px;
            background: #0f172a;
            border-radius: 8px;
            border-left: 3px solid #60a5fa;
        }
        .analysis-title {
            font-weight: bold;
            margin-bottom: 8px;
            color: #60a5fa;
        }
        .timeframe-badge {
            background: #334155;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .signal-chart {
            margin-top: 15px;
            border-radius: 8px;
            overflow: hidden;
            max-height: 300px;
        }
        .signal-chart img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .spinner {
            border: 3px solid #334155;
            border-top: 3px solid #60a5fa;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #64748b;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.75rem; }
            .price-grid { grid-template-columns: 1fr; }
            .filters { flex-direction: column; align-items: stretch; }
            select, input { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Trading Signals</h1>
            <p>Professional forex signals with real-time updates</p>
        </div>

        <div class="stats-bar" id="statsBar">
            <div class="stat-card">
                <div class="stat-value" id="activeCount">-</div>
                <div class="stat-label">Active Signals</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tp1Count">-</div>
                <div class="stat-label">TP1 Hit (30d)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="tp2Count">-</div>
                <div class="stat-label">TP2 Hit (30d)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="winRate">-</div>
                <div class="stat-label">Win Rate</div>
            </div>
        </div>

        <div class="filters">
            <select id="statusFilter">
                <option value="">All Status</option>
                <option value="active" selected>Active</option>
                <option value="tp1_hit">TP1 Hit</option>
                <option value="tp2_hit">TP2 Hit</option>
                <option value="sl_hit">Stop Loss</option>
                <option value="closed">Closed</option>
            </select>
            <select id="timeframeFilter">
                <option value="">All Timeframes</option>
                <option value="M5">M5</option>
                <option value="M15">M15</option>
                <option value="M30">M30</option>
                <option value="H1">H1</option>
                <option value="H4">H4</option>
                <option value="D1">D1</option>
            </select>
            <input type="text" id="pairSearch" placeholder="Search pair (e.g., EURUSD)...">
            <button class="btn btn-primary" onclick="loadSignals()">Refresh</button>
        </div>

        <div class="signals-grid" id="signalsContainer">
            <div class="loading">
                <div class="spinner"></div>
                <p>Loading signals...</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/signals/stats/overview`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                if (res.ok) {
                    const stats = await res.json();
                    document.getElementById('activeCount').textContent = stats.active || 0;
                    document.getElementById('tp1Count').textContent = stats.tp1_hits || 0;
                    document.getElementById('tp2Count').textContent = stats.tp2_hits || 0;
                    
                    const total = stats.tp1_hits + stats.tp2_hits + stats.sl_hits;
                    const winRate = total > 0 ? ((stats.tp1_hits + stats.tp2_hits) / total * 100).toFixed(1) : 0;
                    document.getElementById('winRate').textContent = winRate + '%';
                }
            } catch (e) {
                console.error('Failed to load stats:', e);
            }
        }

        function getStatusClass(status) {
            const map = {
                'active': 'status-active',
                'tp1_hit': 'status-tp1',
                'tp2_hit': 'status-tp2',
                'tp3_hit': 'status-tp2',
                'sl_hit': 'status-sl',
                'closed': 'status-closed',
                'expired': 'status-closed'
            };
            return map[status] || 'status-active';
        }

        function formatStatus(status) {
            return status.replace('_', ' ').toUpperCase();
        }

        async function loadSignals() {
            const container = document.getElementById('signalsContainer');
            container.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading signals...</p></div>';
            
            const status = document.getElementById('statusFilter').value;
            const timeframe = document.getElementById('timeframeFilter').value;
            const pair = document.getElementById('pairSearch').value;
            
            try {
                let url = `${API_BASE}/signals?limit=50`;
                if (status) url += `&status=${status}`;
                if (timeframe) url += `&timeframe=${timeframe}`;
                if (pair) url += `&pair=${pair}`;
                
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) throw new Error('Failed to fetch');
                
                const data = await res.json();
                
                if (data.signals.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h3>No signals found</h3>
                            <p>Try adjusting your filters</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = data.signals.map(signal => `
                    <div class="signal-card">
                        <div class="signal-header">
                            <span class="pair-badge">${signal.pair}</span>
                            <span class="signal-type ${signal.direction}">${signal.direction}</span>
                        </div>
                        <div class="signal-body">
                            <div class="price-grid">
                                <div class="price-item">
                                    <div class="price-label">Entry Price</div>
                                    <div class="price-value">${signal.entry_price || 'Market'}</div>
                                </div>
                                <div class="price-item">
                                    <div class="price-label">Take Profit 1</div>
                                    <div class="price-value tp1">${signal.tp1 || '-'}</div>
                                </div>
                                <div class="price-item">
                                    <div class="price-label">Take Profit 2</div>
                                    <div class="price-value tp2">${signal.tp2 || '-'}</div>
                                </div>
                                <div class="price-item">
                                    <div class="price-label">Stop Loss</div>
                                    <div class="price-value sl">${signal.stop_loss || '-'}</div>
                                </div>
                            </div>
                            
                            <div class="signal-meta">
                                <span class="timeframe-badge">⏱️ ${signal.timeframe || 'N/A'}</span>
                                ${signal.risk_reward_ratio ? `<span class="rr-badge">⚖️ ${signal.risk_reward_ratio}</span>` : ''}
                                <span class="status-badge ${getStatusClass(signal.status)}">
                                    ● ${formatStatus(signal.status)}
                                </span>
                                ${signal.pips_gained ? `<span style="color: ${signal.pips_gained > 0 ? '#22c55e' : '#ef4444'}">${signal.pips_gained > 0 ? '+' : ''}${signal.pips_gained} pips</span>` : ''}
                            </div>
                            
                            ${signal.analysis ? `
                                <div class="analysis-section">
                                    <div class="analysis-title">Analysis</div>
                                    <p>${signal.analysis}</p>
                                </div>
                            ` : ''}
                            
                            ${signal.chart_image_url ? `
                                <div class="signal-chart">
                                    <img src="${signal.chart_image_url}" alt="Chart">
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
                
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h3>Error loading signals</h3>
                        <p>${e.message}</p>
                    </div>
                `;
            }
        }

        // Event listeners
        document.getElementById('statusFilter').addEventListener('change', loadSignals);
        document.getElementById('timeframeFilter').addEventListener('change', loadSignals);
        document.getElementById('pairSearch').addEventListener('input', debounce(loadSignals, 500));

        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

        // Initial load
        loadStats();
        loadSignals();
        
        // Auto refresh every 30 seconds
        setInterval(() => {
            loadStats();
            loadSignals();
        }, 30000);
    </script>
</body>
</html>
