# Render Blueprint for Pipways Trading Platform
# Version: 2.0.8 - Option A: index.html in root

services:
  # ==========================================
  # API SERVICE - Python Backend
  # ==========================================
  - type: web
    name: pipways-api-nhem
    runtime: python
    region: oregon
    plan: standard
    branch: main
    
    runtimeConfig:
      python:
        version: "3.11.0"
    
    buildCommand: |
      echo "Python version:"
      python --version
      pip install --upgrade pip setuptools wheel
      pip install -r requirements.txt
    
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    
    healthCheckPath: /health
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db-nhem
          property: connectionString
      
      - key: SECRET_KEY
        generateValue: true
      
      - key: OPENROUTER_API_KEY
        sync: false
      
      - key: ENVIRONMENT
        value: production
      
      - key: FRONTEND_URL
        value: https://pipways-web-nhem.onrender.com
      
      - key: CORS_ORIGINS
        value: "https://pipways-web-nhem.onrender.com,https://*.onrender.com,http://localhost:3000"
    
    autoDeploy: true

  # ==========================================
  # FRONTEND SERVICE - Static Site
  # ==========================================
  - type: web
    name: pipways-web-nhem
    runtime: static
    region: oregon
    plan: pro
    branch: main
    
    rootDir: .
    
    buildCommand: echo "No build needed"
    
    publishPath: ./        # ← index.html is in repo root
    
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
    
    envVars:
      - key: API_URL
        value: https://pipways-api-nhem.onrender.com
    
    autoDeploy: true

databases:
  - name: pipways-db-nhem
    region: oregon
    plan: standard
