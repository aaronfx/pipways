<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player - Pipways</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            line-height: 1.6;
        }
        .app {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }
        .sidebar {
            background: #1e293b;
            border-right: 1px solid #334155;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .course-header {
            padding: 20px;
            border-bottom: 1px solid #334155;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .course-title {
            font-size: 1.1rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #f8fafc;
        }
        .progress-bar {
            height: 6px;
            background: #334155;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .module-list {
            flex: 1;
            overflow-y: auto;
        }
        .module {
            border-bottom: 1px solid #334155;
        }
        .module-header {
            padding: 15px 20px;
            background: #1e293b;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .module-title {
            font-size: 0.95rem;
        }
        .module-toggle {
            color: #64748b;
            transition: transform 0.2s;
        }
        .module.expanded .module-toggle {
            transform: rotate(180deg);
        }
        .lesson-list {
            display: none;
            background: #0f172a;
        }
        .module.expanded .lesson-list {
            display: block;
        }
        .lesson {
            padding: 12px 20px 12px 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }
        .lesson:hover {
            background: #1e293b;
        }
        .lesson.active {
            background: #1e293b;
            border-left-color: #3b82f6;
        }
        .lesson.completed {
            color: #22c55e;
        }
        .lesson-icon {
            width: 20px;
            text-align: center;
        }
        .lesson-title {
            flex: 1;
            font-size: 0.9rem;
        }
        .lesson-duration {
            font-size: 0.8rem;
            color: #64748b;
        }
        .main-content {
            overflow-y: auto;
            background: #0f172a;
        }
        .content-header {
            padding: 20px 30px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .lesson-title-main {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .content-actions {
            display: flex;
            gap: 10px;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover {
            background: #2563eb;
        }
        .btn-success {
            background: #22c55e;
            color: white;
        }
        .content-body {
            padding: 30px;
            max-width: 900px;
            margin: 0 auto;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            background: #000;
            border-radius: 12px;
            margin-bottom: 30px;
        }
        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 12px;
        }
        .lesson-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #cbd5e1;
        }
        .lesson-content h2 {
            color: #f8fafc;
            margin: 30px 0 15px;
        }
        .lesson-content p {
            margin-bottom: 15px;
        }
        .lesson-content img {
            max-width: 100%;
            border-radius: 8px;
            margin: 20px 0;
        }
        .quiz-container {
            background: #1e293b;
            border-radius: 12px;
            padding: 30px;
            margin-top: 30px;
        }
        .quiz-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        .question {
            margin-bottom: 25px;
            padding-bottom: 25px;
            border-bottom: 1px solid #334155;
        }
        .question:last-child {
            border-bottom: none;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            background: #0f172a;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option:hover {
            background: #334155;
        }
        .option input[type="radio"] {
            accent-color: #3b82f6;
        }
        .option.selected {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
        }
        .qa-section {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 2px solid #334155;
        }
        .qa-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            color: #f8fafc;
        }
        .question-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .question-input {
            flex: 1;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .question-input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .question-item {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        .question-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #64748b;
        }
        .question-content {
            font-weight: 500;
            margin-bottom: 15px;
            color: #e2e8f0;
        }
        .answer {
            background: #0f172a;
            padding: 15px;
            border-radius: 8px;
            border-left: 3px solid #22c55e;
        }
        .answer-label {
            font-size: 0.85rem;
            color: #22c55e;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #334155;
        }
        @media (max-width: 768px) {
            .app { grid-template-columns: 1fr; }
            .sidebar { display: none; }
            .sidebar.mobile-open {
                display: block;
                position: fixed;
                z-index: 100;
                width: 100%;
                height: 100vh;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar" id="sidebar">
            <div class="course-header">
                <div class="course-title" id="courseTitle">Loading...</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <div class="progress-text" id="progressText">0% complete</div>
            </div>
            <div class="module-list" id="moduleList">
                <!-- Modules populated by JS -->
            </div>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h1 class="lesson-title-main" id="lessonTitle">Loading...</h1>
                <div class="content-actions">
                    <button class="btn btn-primary" id="markCompleteBtn" onclick="markComplete()">
                        ✓ Mark Complete
                    </button>
                </div>
            </div>
            
            <div class="content-body">
                <div class="video-container" id="videoContainer" style="display: none;">
                    <!-- Video player injected here -->
                </div>
                
                <div class="lesson-content" id="lessonContent">
                    <!-- Content injected here -->
                </div>
                
                <div class="quiz-container" id="quizContainer" style="display: none;">
                    <!-- Quiz injected here -->
                </div>
                
                <div class="qa-section">
                    <h3 class="qa-title">💬 Questions & Answers</h3>
                    <div class="question-form">
                        <input type="text" class="question-input" id="questionInput" placeholder="Ask a question about this lesson...">
                        <button class="btn btn-primary" onclick="submitQuestion()">Ask</button>
                    </div>
                    <div id="qaList">
                        <!-- Q&A injected here -->
                    </div>
                </div>
                
                <div class="navigation-buttons">
                    <button class="btn" id="prevBtn" onclick="navigateLesson(-1)">← Previous</button>
                    <button class="btn btn-primary" id="nextBtn" onclick="navigateLesson(1)">Next →</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_BASE = '/api';
        const urlParams = new URLSearchParams(window.location.search);
        const courseId = urlParams.get('course_id') || 1;
        let currentLessonId = parseInt(urlParams.get('lesson_id')) || null;
        let courseData = null;
        let currentLesson = null;

        async function loadCourse() {
            try {
                const res = await fetch(`${API_BASE}/courses/${courseId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) throw new Error('Failed to load course');
                
                courseData = await res.json();
                
                document.getElementById('courseTitle').textContent = courseData.title;
                document.getElementById('progressFill').style.width = courseData.progress_percent + '%';
                document.getElementById('progressText').textContent = 
                    `${courseData.progress_percent}% complete (${courseData.completed_lessons}/${courseData.total_lessons} lessons)`;
                
                renderSidebar();
                
                // Load first lesson if none specified
                if (!currentLessonId && courseData.modules.length > 0) {
                    const firstModule = courseData.modules[0];
                    if (firstModule.lessons.length > 0) {
                        currentLessonId = firstModule.lessons[0].id;
                    }
                }
                
                if (currentLessonId) {
                    loadLesson(currentLessonId);
                }
                
            } catch (e) {
                console.error('Error loading course:', e);
                alert('Failed to load course');
            }
        }

        function renderSidebar() {
            const container = document.getElementById('moduleList');
            
            container.innerHTML = courseData.modules.map((module, mIdx) => `
                <div class="module ${mIdx === 0 ? 'expanded' : ''}">
                    <div class="module-header" onclick="toggleModule(this)">
                        <span class="module-title">${module.title}</span>
                        <span class="module-toggle">▼</span>
                    </div>
                    <div class="lesson-list">
                        ${module.lessons.map(lesson => `
                            <div class="lesson ${lesson.id === currentLessonId ? 'active' : ''} ${lesson.is_completed ? 'completed' : ''}" 
                                 onclick="loadLesson(${lesson.id})">
                                <span class="lesson-icon">${lesson.is_completed ? '✓' : (lesson.is_premium ? '🔒' : '▶')}</span>
                                <span class="lesson-title">${lesson.title}</span>
                                <span class="lesson-duration">${lesson.duration_minutes || ''} ${lesson.duration_minutes ? 'min' : ''}</span>
                            </div>
                        `).join('')}
                        ${module.quiz ? `
                            <div class="lesson" onclick="loadQuiz(${module.quiz.id})">
                                <span class="lesson-icon">📝</span>
                                <span class="lesson-title">Module Quiz</span>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleModule(header) {
            header.parentElement.classList.toggle('expanded');
        }

        async function loadLesson(lessonId) {
            currentLessonId = lessonId;
            
            // Update active state in sidebar
            document.querySelectorAll('.lesson').forEach(l => l.classList.remove('active'));
            document.querySelector(`.lesson[onclick="loadLesson(${lessonId})"]`)?.classList.add('active');
            
            try {
                const res = await fetch(`${API_BASE}/courses/${courseId}/lessons/${lessonId}`, {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (!res.ok) throw new Error('Failed to load lesson');
                
                currentLesson = await res.json();
                
                document.getElementById('lessonTitle').textContent = currentLesson.title;
                
                // Handle video
                const videoContainer = document.getElementById('videoContainer');
                if (currentLesson.video_url) {
                    videoContainer.style.display = 'block';
                    if (currentLesson.video_type === 'youtube') {
                        const videoId = currentLesson.video_url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=))([^&?]+)/)?.[1];
                        if (videoId) {
                            videoContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                        }
                    } else if (currentLesson.video_type === 'vimeo') {
                        const videoId = currentLesson.video_url.match(/vimeo\.com\/(\d+)/)?.[1];
                        if (videoId) {
                            videoContainer.innerHTML = `<iframe src="https://player.vimeo.com/video/${videoId}" frameborder="0" allowfullscreen></iframe>`;
                        }
                    } else {
                        videoContainer.innerHTML = `<video controls src="${currentLesson.video_url}"></video>`;
                    }
                } else {
                    videoContainer.style.display = 'none';
                }
                
                // Render content
                document.getElementById('lessonContent').innerHTML = currentLesson.content || 'No content available';
                
                // Update complete button
                const completeBtn = document.getElementById('markCompleteBtn');
                if (currentLesson.is_completed) {
                    completeBtn.textContent = '✓ Completed';
                    completeBtn.classList.remove('btn-primary');
                    completeBtn.classList.add('btn-success');
                    completeBtn.disabled = true;
                } else {
                    completeBtn.textContent = '✓ Mark Complete';
                    completeBtn.classList.add('btn-primary');
                    completeBtn.classList.remove('btn-success');
                    completeBtn.disabled = false;
                }
                
                // Update navigation
                document.getElementById('prevBtn').disabled = !currentLesson.prev_lesson;
                document.getElementById('nextBtn').disabled = !currentLesson.next_lesson;
                
                // Render Q&A
                renderQA(currentLesson.questions);
                
                // Hide quiz
                document.getElementById('quizContainer').style.display = 'none';
                
                // Update URL
                window.history.replaceState({}, '', `?course_id=${courseId}&lesson_id=${lessonId}`);
                
            } catch (e) {
                console.error('Error loading lesson:', e);
            }
        }

        function renderQA(questions) {
            const container = document.getElementById('qaList');
            
            if (!questions || questions.length === 0) {
                container.innerHTML = '<p style="color: #64748b;">No questions yet. Be the first to ask!</p>';
                return;
            }
            
            container.innerHTML = questions.map(q => `
                <div class="question-item">
                    <div class="question-header">
                        <span>${q.student_name}</span>
                        <span>${new Date(q.created_at).toLocaleDateString()}</span>
                    </div>
                    <div class="question-content">${q.question}</div>
                    ${q.is_answered ? `
                        <div class="answer">
                            <div class="answer-label">✓ Answer from ${q.answered_by_name || 'Instructor'}</div>
                            <div>${q.answer}</div>
                        </div>
                    ` : '<div style="color: #64748b; font-size: 0.9rem;">⏳ Awaiting answer...</div>'}
                </div>
            `).join('');
        }

        async function markComplete() {
            if (!currentLessonId) return;
            
            try {
                const res = await fetch(`${API_BASE}/courses/${courseId}/lessons/${currentLessonId}/complete`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
                });
                
                if (res.ok) {
                    // Update UI
                    const btn = document.getElementById('markCompleteBtn');
                    btn.textContent = '✓ Completed';
                    btn.classList.remove('btn-primary');
                    btn.classList.add('btn-success');
                    btn.disabled = true;
                    
                    // Update sidebar
                    document.querySelector(`.lesson[onclick="loadLesson(${currentLessonId})"]`)?.classList.add('completed');
                    
                    // Reload course data for progress
                    loadCourse();
                }
            } catch (e) {
                console.error('Error marking complete:', e);
                alert('Failed to mark lesson as complete');
            }
        }

        async function submitQuestion() {
            const input = document.getElementById('questionInput');
            const question = input.value.trim();
            
            if (!question) return;
            
            try {
                const res = await fetch(`${API_BASE}/courses/${courseId}/lessons/${currentLessonId}/questions`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ question: question, question_type: 'general' })
                });
                
                if (res.ok) {
                    input.value = '';
                    // Reload lesson to show new question
                    loadLesson(currentLessonId);
                }
            } catch (e) {
                console.error('Error submitting question:', e);
                alert('Failed to submit question');
            }
        }

        function navigateLesson(direction) {
            if (!currentLesson) return;
            
            const targetId = direction === 1 ? currentLesson.next_lesson : currentLesson.prev_lesson;
            if (targetId) {
                loadLesson(targetId);
            }
        }

        function loadQuiz(quizId) {
            // Implement quiz loading
            document.getElementById('lessonTitle').textContent = 'Module Quiz';
            document.getElementById('videoContainer').style.display = 'none';
            document.getElementById('lessonContent').innerHTML = '';
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('quizContainer').innerHTML = '<p>Loading quiz...</p>';
            
            // Fetch and render quiz
            fetch(`${API_BASE}/courses/${courseId}/modules/${courseData.modules.find(m => m.quiz?.id === quizId)?.id}/quiz`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('token')}` }
            })
            .then(res => res.json())
            .then(quiz => {
                renderQuiz(quiz);
            });
        }

        function renderQuiz(quiz) {
            const container = document.getElementById('quizContainer');
            
            let html = `<h3 class="quiz-title">${quiz.title}</h3>`;
            html += `<p style="margin-bottom: 20px; color: #94a3b8;">Passing score: ${quiz.passing_score}% | Time limit: ${quiz.time_limit_minutes || 'None'} min</p>`;
            
            html += `<form id="quizForm" onsubmit="submitQuiz(event, ${quiz.id})">`;
            quiz.questions.forEach((q, idx) => {
                html += `
                    <div class="question">
                        <div class="question-text">${idx + 1}. ${q.question_text}</div>
                        <div class="options">
                            ${q.options ? Object.entries(q.options).map(([key, val]) => `
                                <label class="option">
                                    <input type="radio" name="q${q.id}" value="${key}" required>
                                    <span>${val}</span>
                                </label>
                            `).join('') : `
                                <label class="option">
                                    <input type="radio" name="q${q.id}" value="true" required> True
                                </label>
                                <label class="option">
                                    <input type="radio" name="q${q.id}" value="false" required> False
                                </label>
                            `}
                        </div>
                    </div>
                `;
            });
            html += `<button type="submit" class="btn btn-primary">Submit Quiz</button></form>`;
            
            container.innerHTML = html;
        }

        async function submitQuiz(e, quizId) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const answers = {};
            for (let [key, val] of formData.entries()) {
                const qId = key.replace('q', '');
                answers[qId] = val;
            }
            
            const moduleId = courseData.modules.find(m => m.quiz?.id === quizId)?.id;
            
            try {
                const res = await fetch(`${API_BASE}/courses/${courseId}/modules/${moduleId}/quiz/submit`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answers, time_taken: 0 })
                });
                
                const result = await res.json();
                
                const container = document.getElementById('quizContainer');
                const color = result.passed ? '#22c55e' : '#ef4444';
                const emoji = result.passed ? '🎉' : '❌';
                
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px;">
                        <div style="font-size: 4rem; margin-bottom: 20px;">${emoji}</div>
                        <h3 style="color: ${color}; margin-bottom: 20px;">
                            ${result.passed ? 'Congratulations! You passed!' : 'Quiz Failed'}
                        </h3>
                        <p style="font-size: 1.5rem; margin-bottom: 10px;">
                            Score: ${result.score}/${result.max_score} (${result.percentage}%)
                        </p>
                        <p style="color: #64748b;">
                            ${result.passed ? `Attempt ${result.attempt_number} - Passed!` : 
                              `Attempt ${result.attempt_number} - You need ${courseData.modules.find(m => m.quiz?.id === quizId)?.quiz?.passing_score || 70}% to pass`}
                        </p>
                        ${result.passed ? `
                            <button class="btn btn-primary" onclick="loadLesson(${currentLessonId})" style="margin-top: 20px;">
                                Continue Learning
                            </button>
                        ` : `
                            <button class="btn btn-primary" onclick="loadQuiz(${quizId})" style="margin-top: 20px;">
                                Try Again
                            </button>
                        `}
                    </div>
                `;
                
            } catch (e) {
                console.error('Error submitting quiz:', e);
            }
        }

        // Initialize
        loadCourse();
    </script>
</body>
</html>
