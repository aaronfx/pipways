<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pipways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; }
        
        .sidebar {
            background: #1e293b;
            transition: transform 0.3s ease;
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
            border-radius: 0.5rem;
            margin: 0.25rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5e1;
            text-decoration: none;
            cursor: pointer;
        }
        
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .sidebar-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        
        .sidebar-overlay.active { display: block; }
        
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }
            .sidebar.mobile-open { transform: translateX(0); }
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay lg:hidden" onclick="toggleMobileSidebar()"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-64 flex flex-col text-white flex-shrink-0">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-400 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Pipways</h1>
                    <p class="text-xs text-gray-400">Pro Trading</p>
                </div>
            </div>
            <button onclick="toggleMobileSidebar()" class="lg:hidden text-gray-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 overflow-y-auto py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Main</div>
            
            <a onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-link active">
                <i class="fas fa-home w-5 text-center"></i>
                <span>Dashboard</span>
            </a>
            
            <a onclick="showPage('journal')" id="nav-journal" class="sidebar-link">
                <i class="fas fa-book w-5 text-center"></i>
                <span>Trading Journal</span>
            </a>
            
            <a onclick="showPage('analysis')" id="nav-analysis" class="sidebar-link">
                <i class="fas fa-chart-pie w-5 text-center"></i>
                <span>Chart Analysis</span>
            </a>
            
            <a onclick="showPage('trade-analysis')" id="nav-trade-analysis" class="sidebar-link">
                <i class="fas fa-robot w-5 text-center"></i>
                <span>Trade Analysis</span>
            </a>
            
            <a onclick="showPage('courses')" id="nav-courses" class="sidebar-link">
                <i class="fas fa-graduation-cap w-5 text-center"></i>
                <span>Courses</span>
            </a>
            
            <a onclick="showPage('webinars')" id="nav-webinars" class="sidebar-link">
                <i class="fas fa-video w-5 text-center"></i>
                <span>Webinars</span>
            </a>
            
            <a onclick="showPage('mentor')" id="nav-mentor" class="sidebar-link">
                <i class="fas fa-brain w-5 text-center"></i>
                <span>AI Mentor</span>
            </a>
            
            <a onclick="showPage('blog')" id="nav-blog" class="sidebar-link">
                <i class="fas fa-newspaper w-5 text-center"></i>
                <span>Blog</span>
            </a>
            
            <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Admin</div>
            
            <a onclick="showPage('admin')" id="nav-admin" class="sidebar-link hidden">
                <i class="fas fa-cog w-5 text-center"></i>
                <span>Admin Dashboard</span>
            </a>
        </nav>
        
        <div class="p-4 border-t border-white/10">
            <div class="flex items-center gap-3 mb-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-white font-semibold">
                    U
                </div>
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-sm font-medium truncate">User</p>
                    <p id="user-email" class="text-xs text-gray-400 truncate">user@pipways.com</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-300 hover:bg-red-500/30 transition-colors text-sm font-medium cursor-pointer">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 sm:px-8 py-4 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 text-gray-600">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div>
                    <h2 id="page-title" class="text-xl sm:text-2xl font-bold text-gray-800">Dashboard</h2>
                    <p class="text-sm text-gray-500 hidden sm:block">Welcome back to your trading dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-card px-3 sm:px-4 py-2 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs sm:text-sm font-medium text-gray-700 hidden sm:inline">System Online</span>
                </div>
            </div>
        </header>
        
        <!-- Dynamic Content -->
        <main id="content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
            <!-- Content injected by JavaScript -->
        </main>
    </div>

    <script>
        // Inline critical functions to ensure they're available immediately
        const API_BASE = window.location.origin;
        
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
        
        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            window.location.href = '/';
        }
        
        let currentPage = 'dashboard';
        
        function showPage(page) {
            currentPage = page;
            
            // Close mobile sidebar
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
            
            // Update sidebar active state
            document.querySelectorAll('.sidebar-link').forEach(el => {
                el.classList.remove('active');
            });
            
            const activeNav = document.getElementById('nav-' + page);
            if (activeNav) {
                activeNav.classList.add('active');
            }
            
            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'journal': 'Trading Journal',
                'analysis': 'Chart Analysis',
                'trade-analysis': 'Trade Analysis',
                'courses': 'Courses',
                'webinars': 'Webinars',
                'mentor': 'AI Mentor',
                'blog': 'Trading Blog',
                'admin': 'Admin Dashboard'
            };
            const titleEl = document.getElementById('page-title');
            if (titleEl) {
                titleEl.textContent = titles[page] || page;
            }
            
            // Render content
            const content = document.getElementById('content');
            if (!content) return;
            
            content.innerHTML = '<div class="flex items-center justify-center h-64"><div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div></div>';
            
            switch(page) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'journal':
                    renderJournal();
                    break;
                case 'analysis':
                    renderChartAnalysis();
                    break;
                case 'trade-analysis':
                    renderTradeAnalysis();
                    break;
                case 'courses':
                    renderCourses();
                    break;
                case 'webinars':
                    renderWebinars();
                    break;
                case 'mentor':
                    renderMentor();
                    break;
                case 'blog':
                    renderBlog();
                    break;
                case 'admin':
                    renderAdmin();
                    break;
                default:
                    renderDashboard();
            }
        }
        
        // API Object
        const API = {
            async request(endpoint, options = {}) {
                const token = localStorage.getItem('pipways_token');
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                };
                
                if (options.body instanceof FormData) {
                    delete headers['Content-Type'];
                }
                
                const res = await fetch(`${API_BASE}${endpoint}`, {
                    ...options,
                    headers
                });
                
                if (!res.ok) {
                    const err = await res.json().catch(() => ({}));
                    throw new Error(err.detail || `Error ${res.status}`);
                }
                
                return res.json();
            },
            
            getSignals(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/signals/active?${qs}`);
            },
            
            askMentor(question, skillLevel = 'intermediate') {
                return this.request('/ai/mentor/ask', {
                    method: 'POST',
                    body: JSON.stringify({ question, skill_level: skillLevel })
                });
            },
            
            analyzeChart(file, symbol, timeframe) {
                const formData = new FormData();
                formData.append('file', file);
                if (symbol) formData.append('symbol', symbol);
                if (timeframe) formData.append('timeframe', timeframe);
                
                return fetch(`${API_BASE}/ai/chart/analyze`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('pipways_token')}` },
                    body: formData
                }).then(r => r.json());
            },
            
            analyzeJournal(trades) {
                return this.request('/ai/performance/analyze-journal', {
                    method: 'POST',
                    body: JSON.stringify(trades)
                });
            },
            
            getPerformanceStats(days = 30) {
                return this.request(`/ai/performance/dashboard-stats?days=${days}`);
            },
            
            getBlogPosts(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/blog/posts?${qs}`);
            },
            
            getAdminStats() {
                return this.request('/admin/users');
            }
        };
        
        // Render Functions
        function renderDashboard() {
            const content = document.getElementById('content');
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            
            content.innerHTML = `
                <div class="space-y-6 max-w-7xl mx-auto">
                    <!-- Welcome Banner -->
                    <div class="glass-card rounded-2xl p-6 sm:p-8 bg-gradient-to-r from-blue-600 to-purple-600 text-white shadow-lg">
                        <h3 class="text-2xl sm:text-3xl font-bold mb-2">Welcome back, ${user.full_name || user.email || 'Trader'}!</h3>
                        <p class="text-blue-100 text-sm sm:text-base">Your complete trading platform overview</p>
                    </div>
                    
                    <!-- Feature Overview Grid -->
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                        <!-- Trading Signals -->
                        <div onclick="showPage('analysis')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-blue-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-signal text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded">Live</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Trading Signals</h4>
                            <p class="text-sm text-gray-600">Real-time buy/sell signals with entry, SL and TP levels.</p>
                        </div>
                        
                        <!-- AI Mentor -->
                        <div onclick="showPage('mentor')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-purple-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600 group-hover:bg-purple-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-robot text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-purple-600 bg-purple-50 px-2 py-1 rounded">AI</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">AI Mentor</h4>
                            <p class="text-sm text-gray-600">Get personalized trading advice and mentorship 24/7.</p>
                        </div>
                        
                        <!-- Chart Analysis -->
                        <div onclick="showPage('analysis')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-green-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-green-100 flex items-center justify-center text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-chart-bar text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded">Vision</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Chart Analysis</h4>
                            <p class="text-sm text-gray-600">Upload charts for instant pattern recognition.</p>
                        </div>
                        
                        <!-- Trade Journal -->
                        <div onclick="showPage('journal')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-orange-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center text-orange-600 group-hover:bg-orange-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-book text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-orange-600 bg-orange-50 px-2 py-1 rounded">Log</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Trade Journal</h4>
                            <p class="text-sm text-gray-600">Record trades with AI-powered performance analysis.</p>
                        </div>
                        
                        <!-- Performance Analytics -->
                        <div onclick="showPage('trade-analysis')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-red-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-red-100 flex items-center justify-center text-red-600 group-hover:bg-red-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-chart-line text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-red-600 bg-red-50 px-2 py-1 rounded">Stats</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Performance Analytics</h4>
                            <p class="text-sm text-gray-600">Detailed statistics, win rates, and psychology insights.</p>
                        </div>
                        
                        <!-- Courses -->
                        <div onclick="showPage('courses')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-teal-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-teal-100 flex items-center justify-center text-teal-600 group-hover:bg-teal-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-graduation-cap text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-teal-600 bg-teal-50 px-2 py-1 rounded">Learn</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Courses</h4>
                            <p class="text-sm text-gray-600">Master trading with comprehensive video courses.</p>
                        </div>
                        
                        <!-- Webinars -->
                        <div onclick="showPage('webinars')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-pink-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-pink-100 flex items-center justify-center text-pink-600 group-hover:bg-pink-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-video text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-pink-600 bg-pink-50 px-2 py-1 rounded">Live</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Webinars</h4>
                            <p class="text-sm text-gray-600">Live sessions and recorded educational content.</p>
                        </div>
                        
                        <!-- Risk Calculator -->
                        <div onclick="showPage('journal')" class="glass-card rounded-xl p-6 cursor-pointer hover:scale-105 transition-transform border-l-4 border-indigo-500 group">
                            <div class="flex items-start justify-between mb-4">
                                <div class="w-12 h-12 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-colors">
                                    <i class="fas fa-calculator text-xl"></i>
                                </div>
                                <span class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded">Tool</span>
                            </div>
                            <h4 class="font-bold text-gray-800 mb-1">Risk Calculator</h4>
                            <p class="text-sm text-gray-600">Calculate position sizes and manage risk effectively.</p>
                        </div>
                    </div>
                    
                    <!-- Recent Activity -->
                    <div class="glass-card rounded-xl p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-gray-800">Recent Signals</h3>
                            <button onclick="showPage('analysis')" class="text-blue-600 hover:text-blue-800 text-sm font-medium">
                                View All <i class="fas fa-arrow-right ml-1"></i>
                            </button>
                        </div>
                        <div id="recent-signals-list" class="space-y-3">
                            <p class="text-gray-500 text-center py-4">Loading signals...</p>
                        </div>
                    </div>
                </div>
            `;
            
            loadDashboardSignals();
        }
        
        async function loadDashboardSignals() {
            try {
                const signals = await API.getSignals({ limit: 5 });
                const container = document.getElementById('recent-signals-list');
                
                if (signals && signals.length > 0) {
                    container.innerHTML = signals.slice(0, 3).map(s => `
                        <div onclick="showPage('analysis')" class="flex flex-col sm:flex-row sm:items-center justify-between p-4 rounded-lg border-l-4 ${s.direction === 'BUY' ? 'border-green-500 bg-green-50' : 'border-red-500 bg-red-50'} hover:shadow-md transition-shadow cursor-pointer">
                            <div class="mb-2 sm:mb-0">
                                <div class="flex items-center gap-2">
                                    <strong class="text-lg text-gray-800">${s.symbol}</strong>
                                    <span class="px-2 py-1 rounded text-xs font-bold ${s.direction === 'BUY' ? 'bg-green-200 text-green-800' : 'bg-red-200 text-red-800'}">${s.direction}</span>
                                </div>
                                <div class="text-sm text-gray-600 mt-1">
                                    Entry: ${s.entry_price} | SL: ${s.stop_loss} | TP: ${s.take_profit}
                                </div>
                            </div>
                            <div class="text-right text-sm text-gray-500">
                                ${new Date(s.created_at).toLocaleDateString()}
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<p class="text-gray-500 text-center py-4">No active signals available</p>';
                }
            } catch (e) {
                console.error('Failed to load signals:', e);
                const container = document.getElementById('recent-signals-list');
                if (container) {
                    container.innerHTML = '<p class="text-red-500 text-center py-4">Failed to load signals</p>';
                }
            }
        }
        
        function renderJournal() {
            const content = document.getElementById('content');
            content.innerHTML = `
                <div class="max-w-4xl mx-auto space-y-6">
                    <div class="glass-card rounded-xl p-6 sm:p-8">
                        <h3 class="text-xl sm:text-2xl font-bold text-gray-800 mb-4">Trading Journal</h3>
                        <p class="text-gray-600 mb-6">Record and analyze your trading history.</p>
                        <div class="space-y-4">
                            <textarea id="journal-input" rows="8" class="w-full p-4 border border-gray-200 rounded-lg font-mono text-sm" placeholder="Paste trade data here..."></textarea>
                            <div class="flex flex-col sm:flex-row gap-4">
                                <button onclick="analyzeJournal()" class="gradient-btn px-6 py-3 rounded-lg text-white font-semibold cursor-pointer">
                                    <i class="fas fa-brain mr-2"></i> Analyze with AI
                                </button>
                            </div>
                        </div>
                    </div>
                    <div id="journal-results" class="hidden glass-card rounded-xl p-6"></div>
                </div>
            `;
        }
        
        async function analyzeJournal() {
            const input = document.getElementById('journal-input');
            const resultsDiv = document.getElementById('journal-results');
            if (!input || !input.value.trim()) return;
            
            try {
                const trades = JSON.parse(input.value);
                resultsDiv.classList.remove('hidden');
                resultsDiv.innerHTML = '<div class="flex items-center justify-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>';
                
                const analysis = await API.analyzeJournal(trades);
                resultsDiv.innerHTML = \`
                    <h4 class="text-lg font-bold mb-4">Grade: \${analysis.overall_grade}</h4>
                    <div class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-6">
                        <div class="text-center p-4 bg-gray-50 rounded">
                            <div class="text-2xl font-bold text-blue-600">\${analysis.statistics?.win_rate || 0}%</div>
                            <div class="text-xs text-gray-600">Win Rate</div>
                        </div>
                        <div class="text-center p-4 bg-gray-50 rounded">
                            <div class="text-2xl font-bold text-green-600">\${analysis.statistics?.profit_factor || 0}</div>

        async function sendMentorMessage() {
            const input = document.getElementById('mentorInput');
            const container = document.getElementById('mentor-messages');
            if (!input || !input.value.trim()) return;
            
            const message = input.value.trim();
            container.innerHTML += \`
                <div class="flex gap-3 flex-row-reverse">
                    <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 text-sm flex-shrink-0"><i class="fas fa-user"></i></div>
                    <div class="bg-blue-600 p-3 rounded-2xl rounded-tr-none shadow-sm max-w-[80%]"><p class="text-white">\${message}</p></div>
                </div>
            \`;
            input.value = '';
            container.scrollTop = container.scrollHeight;
            
            try {
                const response = await API.askMentor(message);
                container.innerHTML += \`
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-sm flex-shrink-0"><i class="fas fa-robot"></i></div>
                        <div class="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm max-w-[80%]"><p class="text-gray-800">\${response.response}</p></div>
                    </div>
                \`;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                container.innerHTML += '<div class="text-red-500 text-sm">Error: Could not get response</div>';
            }
        }
        
        function askMentor(question) {
            const input = document.getElementById('mentorInput');
            if (input) {
                input.value = question;
                sendMentorMessage();
            }
        }
