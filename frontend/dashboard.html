<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pipways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: #f3f4f6; 
            overflow-x: hidden;
        }
        
        .sidebar {
            background: #1e293b;
            transition: transform 0.3s ease;
        }
        
        .sidebar-link {
            transition: all 0.3s ease;
            border-radius: 0.5rem;
            margin: 0.25rem 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            color: #cbd5e1;
            text-decoration: none;
            cursor: pointer;
        }
        
        .sidebar-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
        
        .sidebar-link.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        .gradient-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .gradient-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 40;
        }
        
        .sidebar-overlay.active { display: block; }
        
        @media (max-width: 1024px) {
            .sidebar {
                position: fixed;
                left: 0; top: 0; bottom: 0;
                z-index: 50;
                transform: translateX(-100%);
            }
            .sidebar.mobile-open { transform: translateX(0); }
        }
        
        /* Feature Card Hover Effects */
        .feature-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .feature-card:hover {
            transform: translateY(-4px) scale(1.02);
        }
        
        .feature-icon {
            transition: all 0.3s ease;
        }
        
        .feature-card:hover .feature-icon {
            transform: scale(1.1) rotate(5deg);
        }
        
        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: white;
            border-left: 4px solid #3b82f6;
            padding: 1rem 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            z-index: 9999;
            animation: slideIn 0.3s ease-out;
            max-width: 400px;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .toast.success { border-left-color: #10b981; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }
        
        /* Loading Spinner */
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">
    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay lg:hidden" onclick="toggleMobileSidebar()"></div>
    
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar w-64 flex flex-col text-white flex-shrink-0 overflow-y-auto">
        <div class="p-6 border-b border-white/10 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-blue-400 to-purple-600 flex items-center justify-center">
                    <i class="fas fa-chart-line text-white"></i>
                </div>
                <div>
                    <h1 class="text-xl font-bold">Pipways</h1>

                </div>
            </div>
            <button onclick="toggleMobileSidebar()" class="lg:hidden text-gray-400 hover:text-white">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 py-4">
            <div class="px-4 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Main</div>
            
            <a onclick="showPage('dashboard')" id="nav-dashboard" class="sidebar-link active">
                <i class="fas fa-home w-5 text-center"></i>
                <span>Dashboard</span>
            </a>
            
            <a onclick="showPage('signals')" id="nav-signals" class="sidebar-link">
                <i class="fas fa-signal w-5 text-center"></i>
                <span>Trading Signals</span>
            </a>
            
            <a onclick="showPage('journal')" id="nav-journal" class="sidebar-link">
                <i class="fas fa-book w-5 text-center"></i>
                <span>Trading Journal</span>
            </a>
            
            <a onclick="showPage('analysis')" id="nav-analysis" class="sidebar-link">
                <i class="fas fa-chart-pie w-5 text-center"></i>
                <span>Chart Analysis</span>
            </a>
            
            <a onclick="showPage('trade-analysis')" id="nav-trade-analysis" class="sidebar-link">
                <i class="fas fa-chart-line w-5 text-center"></i>
                <span>Performance</span>
            </a>
            
            <a onclick="showPage('mentor')" id="nav-mentor" class="sidebar-link">
                <i class="fas fa-robot w-5 text-center"></i>
                <span>AI Mentor</span>
            </a>
            
            <a onclick="showPage('courses')" id="nav-courses" class="sidebar-link">
                <i class="fas fa-graduation-cap w-5 text-center"></i>
                <span>Courses</span>
            </a>
            
            <a onclick="showPage('webinars')" id="nav-webinars" class="sidebar-link">
                <i class="fas fa-video w-5 text-center"></i>
                <span>Webinars</span>
            </a>
            
            <a onclick="showPage('blog')" id="nav-blog" class="sidebar-link">
                <i class="fas fa-newspaper w-5 text-center"></i>
                <span>Blog</span>
            </a>
            
            <div id="admin-nav-section" class="hidden">
                <div class="px-4 mt-6 mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Admin</div>
                <a onclick="showPage('admin')" id="nav-admin" class="sidebar-link">
                    <i class="fas fa-shield-alt w-5 text-center"></i>
                    <span>Admin Dashboard</span>
                </a>
            </div>
        </nav>
        
        <div class="p-4 border-t border-white/10 mt-auto">
            <div class="flex items-center gap-3 mb-3">
                <div id="user-avatar" class="w-10 h-10 rounded-full bg-gradient-to-br from-green-400 to-blue-500 flex items-center justify-center text-white font-semibold">
                    U
                </div>
                <div class="flex-1 min-w-0">
                    <p id="user-name" class="text-sm font-medium truncate">User</p>
                    <p id="user-email" class="text-xs text-gray-400 truncate">user@pipways.com</p>
                </div>
            </div>
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-red-500/20 text-red-300 hover:bg-red-500/30 transition-colors text-sm font-medium cursor-pointer">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- Header -->
        <header class="bg-white/80 backdrop-blur-md border-b border-gray-200 px-4 sm:px-8 py-4 flex justify-between items-center flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 text-gray-600">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <div>
                    <h2 id="page-title" class="text-xl sm:text-2xl font-bold text-gray-800">Dashboard</h2>
                    <p class="text-sm text-gray-500 hidden sm:block">Welcome back to your trading dashboard</p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div class="glass-card px-3 sm:px-4 py-2 rounded-full flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="text-xs sm:text-sm font-medium text-gray-700 hidden sm:inline">System Online</span>
                </div>
            </div>
        </header>
        
        <!-- Dynamic Content -->
        <main id="content" class="flex-1 overflow-y-auto p-4 sm:p-6 lg:p-8 bg-gray-50">
            <!-- Content injected by JavaScript -->
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts loaded in correct order -->
    <script src="store.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="auth.js"></script>
    
    <script>
        // ==========================================
        // CORE NAVIGATION & UI FUNCTIONS
        // ==========================================
        
        const API_BASE = window.location.origin;
        let currentPage = 'dashboard';
        
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('mobile-open');
            overlay.classList.toggle('active');
        }
        
        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            window.location.href = '/';
        }
        
        function showPage(page) {
            currentPage = page;
            
            // Close mobile sidebar
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar && sidebar.classList.contains('mobile-open')) {
                sidebar.classList.remove('mobile-open');
                overlay.classList.remove('active');
            }
            
            // Update sidebar active state
            document.querySelectorAll('.sidebar-link').forEach(el => {
                el.classList.remove('active');
            });
            
            const activeNav = document.getElementById('nav-' + page);
            if (activeNav) {
                activeNav.classList.add('active');
            }
            
            // Update page title
            const titles = {
                'dashboard': 'Dashboard',
                'signals': 'Trading Signals',
                'journal': 'Trading Journal',
                'analysis': 'Chart Analysis',
                'trade-analysis': 'Performance Analytics',
                'courses': 'Trading Courses',
                'webinars': 'Live Webinars',
                'mentor': 'AI Mentor',
                'blog': 'Trading Blog',
                'admin': 'Admin Dashboard'
            };
            const titleEl = document.getElementById('page-title');
            if (titleEl) {
                titleEl.textContent = titles[page] || page;
            }
            
            // Render content
            const content = document.getElementById('content');
            if (!content) return;
            
            content.innerHTML = `
                <div class="flex items-center justify-center h-64">
                    <div class="spinner"></div>
                </div>
            `;
            
            switch(page) {
                case 'dashboard':
                    renderDashboard();
                    break;
                case 'signals':
                    renderSignals();
                    break;
                case 'journal':
                    renderJournal();
                    break;
                case 'analysis':
                    renderChartAnalysis();
                    break;
                case 'trade-analysis':
                    renderTradeAnalysis();
                    break;
                case 'courses':
                    renderCourses();
                    break;
                case 'webinars':
                    renderWebinars();
                    break;
                case 'mentor':
                    renderMentor();
                    break;
                case 'blog':
                    renderBlog();
                    break;
                case 'admin':
                    renderAdmin();
                    break;
                default:
                    renderDashboard();
            }
        }
        
        // ==========================================
        // DASHBOARD OVERVIEW - FEATURE CARDS
        // ==========================================
        
        function renderDashboard() {
            const content = document.getElementById('content');
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            
            content.innerHTML = `
                <div class="space-y-8 max-w-7xl mx-auto">
                    <!-- Welcome Banner -->
                    <div class="glass-card rounded-2xl p-6 sm:p-8 bg-gradient-to-r from-blue-600 via-purple-600 to-indigo-600 text-white shadow-lg relative overflow-hidden">
                        <div class="absolute top-0 right-0 -mr-10 -mt-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                        <div class="absolute bottom-0 left-0 -ml-10 -mb-10 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
                        <div class="relative z-10">
                            <h3 class="text-2xl sm:text-3xl font-bold mb-2">Welcome back, ${user.full_name || user.email || 'Trader'}!</h3>

                        </div>
                    </div>
                    
                    <!-- Feature Overview Grid -->
                    <div>
                        <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-th-large text-blue-600"></i>
                            Platform Features
                        </h3>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
                            
                            <!-- Trading Signals -->
                            <div onclick="showPage('signals')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-blue-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-blue-100 flex items-center justify-center text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                        <i class="fas fa-signal text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-blue-600 bg-blue-50 px-2 py-1 rounded-full">Live</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">Trading Signals</h4>
                                <p class="text-sm text-gray-600 mb-4">Real-time buy/sell signals with precise entry, stop loss and take profit levels.</p>
                                <button class="text-sm font-semibold text-blue-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    View Signals <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                            
                            <!-- AI Mentor -->
                            <div onclick="showPage('mentor')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-purple-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-purple-100 flex items-center justify-center text-purple-600 group-hover:bg-purple-600 group-hover:text-white transition-all">
                                        <i class="fas fa-robot text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-purple-600 bg-purple-50 px-2 py-1 rounded-full">AI</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">AI Mentor</h4>
                                <p class="text-sm text-gray-600 mb-4">Get personalized trading advice, strategy feedback, and market analysis 24/7.</p>
                                <button class="text-sm font-semibold text-purple-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    Ask AI Mentor <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                            
                            <!-- Chart Analysis -->
                            <div onclick="showPage('analysis')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-green-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-green-100 flex items-center justify-center text-green-600 group-hover:bg-green-600 group-hover:text-white transition-all">
                                        <i class="fas fa-chart-bar text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-green-600 bg-green-50 px-2 py-1 rounded-full">Vision</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">Chart Analysis</h4>
                                <p class="text-sm text-gray-600 mb-4">Upload charts for instant pattern recognition and technical analysis.</p>
                                <button class="text-sm font-semibold text-green-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    Analyze Chart <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                            
                            <!-- Trading Journal -->
                            <div onclick="showPage('journal')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-orange-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-orange-100 flex items-center justify-center text-orange-600 group-hover:bg-orange-600 group-hover:text-white transition-all">
                                        <i class="fas fa-book text-xl"></i>

                            <!-- Performance Analytics -->
                            <div onclick="showPage('trade-analysis')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-red-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-red-100 flex items-center justify-center text-red-600 group-hover:bg-red-600 group-hover:text-white transition-all">
                                        <i class="fas fa-chart-line text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-red-600 bg-red-50 px-2 py-1 rounded-full">Stats</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">Performance Analytics</h4>
                                <p class="text-sm text-gray-600 mb-4">Detailed statistics, win rates, profit factors, and trading psychology insights.</p>
                                <button class="text-sm font-semibold text-red-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    View Analytics <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                            
                            <!-- Courses -->
                            <div onclick="showPage('courses')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-teal-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-teal-100 flex items-center justify-center text-teal-600 group-hover:bg-teal-600 group-hover:text-white transition-all">
                                        <i class="fas fa-graduation-cap text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-teal-600 bg-teal-50 px-2 py-1 rounded-full">Learn</span>

                            </div>
                            
                            <!-- Webinars -->
                            <div onclick="showPage('webinars')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-pink-500 group">

                                    <div class="feature-icon w-12 h-12 rounded-lg bg-pink-100 flex items-center justify-center text-pink-600 group-hover:bg-pink-600 group-hover:text-white transition-all">
                                        <i class="fas fa-video text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-pink-600 bg-pink-50 px-2 py-1 rounded-full">Live</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">Live Webinars</h4>
                                <p class="text-sm text-gray-600 mb-4">Join live trading sessions and access recorded educational content.</p>
                                <button class="text-sm font-semibold text-pink-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    View Schedule <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                            
                            <!-- Blog -->
                            <div onclick="showPage('blog')" class="glass-card feature-card rounded-xl p-6 cursor-pointer border-l-4 border-indigo-500 group">
                                <div class="flex items-start justify-between mb-4">
                                    <div class="feature-icon w-12 h-12 rounded-lg bg-indigo-100 flex items-center justify-center text-indigo-600 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                                        <i class="fas fa-newspaper text-xl"></i>
                                    </div>
                                    <span class="text-xs font-semibold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full">Read</span>
                                </div>
                                <h4 class="font-bold text-gray-800 mb-2">Trading Blog</h4>
                                <p class="text-sm text-gray-600 mb-4">Latest market insights, trading guides, and educational articles.</p>
                                <button class="text-sm font-semibold text-indigo-600 flex items-center gap-1 group-hover:gap-2 transition-all">
                                    Read Blog <i class="fas fa-arrow-right text-xs"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Recent Activity Section -->
                    <div class="glass-card rounded-xl p-6">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-lg font-bold text-gray-800 flex items-center gap-2">
                                <i class="fas fa-bolt text-yellow-500"></i>
                                Recent Signals
                            </h3>
                            <button onclick="showPage('signals')" class="text-blue-600 hover:text-blue-800 text-sm font-medium flex items-center gap-1">
                                View All <i class="fas fa-arrow-right text-xs"></i>
                            </button>
                        </div>
                        <div id="recent-signals-list" class="space-y-3">
                            <div class="animate-pulse flex space-x-4">
                                <div class="flex-1 space-y-4 py-1">
                                    <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Quick Stats Row -->

        // API DEFINITIONS

        const API = {
            async request(endpoint, options = {}) {
                const token = localStorage.getItem('pipways_token');
                const headers = {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` }),
                    ...options.headers
                };
                
                if (options.body instanceof FormData) {
                    delete headers['Content-Type'];
                }
                
                try {
                    const res = await fetch(`${API_BASE}${endpoint}`, {
                        ...options,
                        headers
                    });
                    
                    if (!res.ok) {
                        const err = await res.json().catch(() => ({}));
                        throw new Error(err.detail || `Error ${res.status}`);
                    }
                    
                    return res.json();
                } catch (error) {
                    if (error.message === 'Failed to fetch') {
                        throw new Error('Network error. Please check your connection.');
                    }
                    throw error;
                }
            },
            
            getSignals(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/signals/active?${qs}`);
            },
            
            getCourses() {
                return this.request('/courses/list');
            },
            
            getWebinars(upcoming = true) {
                return this.request(`/webinars/upcoming?upcoming=${upcoming}`);
            },
            
            askMentor(question, skillLevel = 'intermediate') {
                return this.request('/ai/mentor/ask', {
                    method: 'POST',
                    body: JSON.stringify({ question, skill_level: skillLevel })
                });
            },
            
            analyzeChart(file, symbol, timeframe) {
                const formData = new FormData();
                formData.append('file', file);
                if (symbol) formData.append('symbol', symbol);
                if (timeframe) formData.append('timeframe', timeframe);
                
                return fetch(`${API_BASE}/ai/chart/analyze`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('pipways_token')}` },
                    body: formData
                }).then(r => r.json());
            },
            
            analyzeJournal(trades) {
                return this.request('/ai/performance/analyze-journal', {
                    method: 'POST',
                    body: JSON.stringify(trades)
                });
            },
            
            getPerformanceStats(days = 30) {
                return this.request(`/ai/performance/dashboard-stats?days=${days}`);
            },
            
            getBlogPosts(params = {}) {
                const qs = new URLSearchParams(params).toString();
                return this.request(`/blog/posts?${qs}`);
            },
            
            getAdminStats() {
                return this.request('/admin/users');
            },
            
            calculateRisk(data) {
                return this.request('/risk/calculate', {
                    method: 'POST',
                    body: JSON.stringify(data)
                });
            }
        };

        async function sendMentorMessage() {
            const input = document.getElementById('mentorInput');
            const container = document.getElementById('mentor-messages');
            
            if (!input || !container) return;
            
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            container.innerHTML += `
                <div class="flex gap-3 flex-row-reverse">
                    <div class="w-8 h-8 rounded-full bg-gray-300 flex items-center justify-center text-gray-600 text-sm flex-shrink-0">

                        <p class="text-white">${escapeHtml(message)}</p>
                    </div>
                </div>
            `;
            
            input.value = '';
            container.scrollTop = container.scrollHeight;
            
            // Show typing indicator
            const typingId = 'typing-' + Date.now();
            container.innerHTML += `
                <div id="${typingId}" class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-sm flex-shrink-0">

                            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                            <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        </div>
                    </div>
                </div>
            `;
            container.scrollTop = container.scrollHeight;
            
            try {
                const response = await API.askMentor(message);
                const typingEl = document.getElementById(typingId);
                if (typingEl) typingEl.remove();
                
                container.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-500 to-purple-600 flex items-center justify-center text-white text-sm flex-shrink-0">

                                <div class="mt-2 pt-2 border-t border-gray-100 text-xs text-blue-600">
                                    <strong>Suggested:</strong> ${response.suggested_resources.join(', ')}
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
                container.scrollTop = container.scrollHeight;
            } catch (e) {
                const typingEl = document.getElementById(typingId);
                if (typingEl) typingEl.remove();
                
                container.innerHTML += `
                    <div class="flex gap-3">
                        <div class="w-8 h-8 rounded-full bg-red-500 flex items-center justify-center text-white text-sm flex-shrink-0">

                        </div>
                    </div>
                `;
            }
        }

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="flex items-center justify-between gap-4">
                    <span>${message}</span>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-gray-400 hover:text-gray-600">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                if (toast.parentElement) toast.remove();
            }, 5000);
        }
        
        // ==========================================
        // INITIALIZATION
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', () => {
            // Check authentication
            const token = localStorage.getItem('pipways_token');
            if (!token) {
                window.location.href = '/';
                return;
            }
            
            // Load user data
            const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
            if (user.email) {
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('user-name').textContent = user.full_name || user.email.split('@')[0];
                document.getElementById('user-avatar').textContent = (user.full_name || user.email)[0].toUpperCase();
                
                // Show admin nav if applicable
                if (user.is_admin) {
                    document.getElementById('admin-nav-section').classList.remove('hidden');
                }
            }
            
            // Initialize page
            showPage('dashboard');
        });
    </script>
