<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .auth-container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        
        .logo { margin-bottom: 2rem; }
        
        .logo h1 { 
            color: #3b82f6; 
            margin: 0; 
            font-size: 2.5rem;
            font-weight: 700;
        }
        
        .logo p { 
            color: #64748b; 
            margin-top: 0.5rem;
            font-size: 1rem;
        }
        
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        
        .tab-btn.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
        
        .auth-form {
            display: none;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }
        
        .auth-form.active {
            display: flex;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
            font-size: 0.875rem;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2563eb;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
            margin-top: 0.5rem;
        }
        
        .btn-success:hover {
            background: #059669;
        }
        
        .alert {
            padding: 0.875rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
            text-align: left;
            font-size: 0.875rem;
        }
        
        .alert-error { 
            background: #fee2e2; 
            color: #991b1b; 
            border: 1px solid #fecaca; 
        }
        
        .alert-success { 
            background: #dcfce7; 
            color: #166534; 
            border: 1px solid #bbf7d0; 
        }
        
        .switch-link {
            margin-top: 1.5rem;
            color: #64748b;
            font-size: 0.875rem;
        }
        
        .switch-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .switch-link a:hover {
            text-decoration: underline;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>Pipways</h1>
            <p>Professional Trading Platform</p>
        </div>
        
        <div id="alertBox" class="alert"></div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showLogin()" id="loginTab">Login</button>
            <button class="tab-btn" onclick="showRegister()" id="registerTab">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="your@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" id="loginBtn">Login</button>
        </form>

        <form id="registerForm" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="John Doe" required>
            </div>
            <button type="submit" class="btn btn-success" id="registerBtn">Create Account</button>
        </form>
        
        <div class="switch-link">
            <span id="switchText">Don't have an account? <a onclick="showRegister()">Sign up</a></span>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/dashboard.html';
        }

        function showLogin() {
            document.getElementById('loginForm').classList.add('active');
            document.getElementById('registerForm').classList.remove('active');
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
            document.getElementById('switchText').innerHTML = 'Don\'t have an account? <a onclick="showRegister()">Sign up</a>';
            hideAlert();
        }

        function showRegister() {
            document.getElementById('loginForm').classList.remove('active');
            document.getElementById('registerForm').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('switchText').innerHTML = 'Already have an account? <a onclick="showLogin()">Login</a>';
            hideAlert();
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alertBox');
            // Clean message - truncate if too long
            let cleanMessage = message;
            if (message.length > 150) {
                cleanMessage = message.substring(0, 150) + '...';
            }
            // Remove HTML tags
            cleanMessage = cleanMessage.replace(/<[^>]*>/g, '');
            
            alert.textContent = cleanMessage;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
        }

        function hideAlert() {
            document.getElementById('alertBox').style.display = 'none';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? 'Login' : 'Create Account';
            }
        }

        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://pipwaysapp.onrender.com';

        async function handleLogin(e) {
            e.preventDefault();
            hideAlert();
            setLoading('loginBtn', true);
            
            const formData = new FormData(e.target);
            const username = formData.get('username');
            const password = formData.get('password');

            try {
                const form = new FormData();
                form.append('username', username);
                form.append('password', password);

                const res = await fetch(`${API_URL}/auth/token`, {
                    method: 'POST',
                    body: form
                });

                if (!res.ok) {
                    let errorMsg = 'Invalid credentials';
                    try {
                        const errorData = await res.json();
                        errorMsg = errorData.detail || errorMsg;
                    } catch (e) {
                        const text = await res.text();
                        if (text && text.length < 100 && !text.includes('<')) {
                            errorMsg = text;
                        }
                    }
                    throw new Error(errorMsg);
                }
                
                const data = await res.json();
                
                if (!data.access_token) {
                    throw new Error('Invalid server response');
                }
                
                localStorage.setItem('token', data.access_token);
                if (data.user) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                }
                
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
                
            } catch (err) {
                showAlert(err.message || 'Login failed. Please try again.');
                setLoading('loginBtn', false);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            hideAlert();
            setLoading('registerBtn', true);
            
            const formData = new FormData(e.target);
            const data = {
                email: formData.get('email'),
                password: formData.get('password'),
                full_name: formData.get('full_name')
            };

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    let errorMsg = 'Registration failed';
                    try {
                        const errorData = await res.json();
                        errorMsg = errorData.detail || errorMsg;
                    } catch (e) {
                        const text = await res.text();
                        if (text && text.length < 100 && !text.includes('<')) {
                            errorMsg = text;
                        } else if (text.includes('Internal Server Error')) {
                            errorMsg = 'Server error. Please try again later.';
                        }
                    }
                    throw new Error(errorMsg);
                }

                const result = await res.json();
                
                if (!result.access_token) {
                    throw new Error('Registration incomplete');
                }
                
                localStorage.setItem('token', result.access_token);
                if (result.user) {
                    localStorage.setItem('user', JSON.stringify(result.user));
                }

                showAlert('Account created successfully! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 800);
                
            } catch (err) {
                showAlert(err.message || 'Registration failed. Please try again.');
                setLoading('registerBtn', false);
            }
        }
    </script>
</body>
</html>
