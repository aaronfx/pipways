<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Professional Trading Platform</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand">
            <h1>Pipways</h1>
            <p>Professional Trading Platform</p>
        </div>
        
        <div id="alertBox" class="alert" style="display: none; padding: 1rem; margin-bottom: 1rem; border-radius: 0.5rem;"></div>
        
        <div class="auth-tabs">
            <button class="tab-btn active" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('register')">Sign Up</button>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)" style="text-align: left;">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" value="admin@pipways.com" required placeholder="admin@pipways.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" value="admin123" required placeholder="admin123">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" style="display: none; text-align: left;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required minlength="8" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <button type="submit" class="btn btn-success btn-block">Create Account</button>
        </form>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alertBox');
            alert.textContent = message;
            alert.style.display = 'block';
            alert.className = type === 'error' ? 'alert bg-danger text-danger' : 'alert bg-success text-success';
            setTimeout(() => alert.style.display = 'none', 5000);
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const res = await fetch(`${API_BASE}/auth/token`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Login failed');
                }
                
                const data = await res.json();
                localStorage.setItem('pipways_token', data.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(data.user));
                
                window.location.href = '/dashboard.html#/dashboard';
            } catch (e) {
                showAlert(e.message, 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const data = {
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                full_name: document.getElementById('regName').value
            };
            
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Registration failed');
                }
                
                const result = await res.json();
                localStorage.setItem('pipways_token', result.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(result.user));
                
                window.location.href = '/dashboard.html#/dashboard';
            } catch (e) {
                showAlert(e.message, 'error');
            }
        }
        
        if (localStorage.getItem('pipways_token')) {
            window.location.href = '/dashboard.html#/dashboard';
        }
    </script>
</body>
</html>
