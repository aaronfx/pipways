<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mentor - Pipways</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <style>
        :root {
            --bg-primary: #0B0F19;
            --bg-secondary: #111827;
            --bg-card: #1F2937;
            --bg-hover: #374151;
            --border-color: #374151;
            --text-primary: #F9FAFB;
            --text-secondary: #9CA3AF;
            --accent-primary: #8B5CF6;
            --accent-secondary: #7C3AED;
            --accent-gradient: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%);
            --success: #10B981;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        /* Page-specific layout */
        .mentor-page {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 2rem;
            height: calc(100vh - 80px);
        }

        .chat-container {
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .chat-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .chat-header-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        .chat-header h2 {
            margin: 0;
            color: var(--text-primary);
            font-size: 1.25rem;
            font-weight: 700;
        }

        .chat-header p {
            margin: 0.25rem 0 0 0;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            background: var(--bg-secondary);
        }

        .message {
            display: flex;
            gap: 0.75rem;
            max-width: 85%;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.125rem;
            flex-shrink: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .message.ai .message-avatar {
            background: var(--accent-gradient);
            border: none;
            color: white;
        }

        .message-content {
            padding: 1rem 1.25rem;
            border-radius: 1rem;
            line-height: 1.6;
            font-size: 0.9375rem;
        }

        .message.ai .message-content {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 0.25rem;
            border: 1px solid var(--border-color);
        }

        .message.user .message-content {
            background: var(--accent-gradient);
            color: white;
            border-bottom-right-radius: 0.25rem;
            font-weight: 500;
        }

        .chat-input-container {
            padding: 1.25rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 0.75rem;
        }

        #message-input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            color: var(--text-primary);
            font-size: 0.9375rem;
            outline: none;
            transition: all 0.2s;
        }

        #message-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1);
        }

        #message-input::placeholder {
            color: var(--text-secondary);
        }

        #send-btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 0.875rem 1.5rem;
            border-radius: 0.75rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
        }

        #send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
        }

        /* Quick Commands */
        .quick-commands {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            padding: 1rem 1.25rem;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
        }

        .quick-cmd-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .quick-cmd-btn:hover {
            background: var(--accent-primary);
            color: white;
            border-color: var(--accent-primary);
            transform: translateY(-1px);
        }

        /* Sidebar */
        .mentor-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .progress-card, .stats-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border-color);
        }

        .progress-card h3, .stats-card h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin: 0 0 1rem 0;
            font-weight: 600;
        }

        .progress-bar-bg {
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 9999px;
            overflow: hidden;
            margin: 0.75rem 0;
        }

        .progress-bar-fill {
            height: 100%;
            background: var(--accent-gradient);
            transition: width 0.5s ease;
            border-radius: 9999px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            padding: 0.5rem 0;
        }

        .typing-dots {
            display: flex;
            gap: 0.25rem;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent-primary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-dots span:nth-child(1) { animation-delay: -0.32s; }
        .typing-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Lesson Cards */
        .lesson-recommendations {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px dashed var(--border-color);
        }

        .recommendations-label {
            font-size: 0.75rem;
            color: var(--accent-primary);
            margin-bottom: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        .lesson-cards-container {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .lesson-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .lesson-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            transition: width 0.2s;
        }

        .lesson-card:hover {
            transform: translateX(4px);
            border-color: var(--accent-primary);
            box-shadow: 0 4px 12px rgba(139, 92, 246, 0.15);
        }

        .lesson-card-next::before {
            background: var(--success);
        }

        .lesson-card-recommended::before {
            background: var(--accent-primary);
        }

        .lesson-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .lesson-badge {
            font-size: 0.6875rem;
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .lesson-card-next .lesson-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .lesson-card-recommended .lesson-badge {
            background: rgba(139, 92, 246, 0.2);
            color: #A78BFA;
        }

        .lesson-icon {
            font-size: 1.25rem;
        }

        .lesson-title {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 0.25rem 0;
        }

        .lesson-description {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            margin: 0 0 0.75rem 0;
        }

        .lesson-cta-btn {
            background: rgba(255,255,255,0.05);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.8125rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .lesson-card:hover .lesson-cta-btn {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        .lesson-card-next:hover .lesson-cta-btn {
            background: var(--success);
            border-color: var(--success);
        }

        @media (max-width: 768px) {
            .mentor-page {
                grid-template-columns: 1fr;
                height: auto;
            }

            .chat-container {
                height: 70vh;
            }

            .mentor-sidebar {
                order: -1;
            }

            .message {
                max-width: 95%;
            }
        }
    </style>
</head>
<body>
    <div class="mentor-page">
        <div class="chat-container">
            <div class="chat-header">
                <div class="chat-header-icon">🤖</div>
                <div>
                    <h2>AI Trading Mentor</h2>
                    <p>Your personal 24/7 trading coach</p>
                </div>
            </div>

            <div id="chat-messages" class="chat-messages">
                <!-- Messages appear here -->
            </div>

            <div class="quick-commands">
                <button class="quick-cmd-btn" data-cmd="/next">📚 Next Lesson</button>
                <button class="quick-cmd-btn" data-cmd="risk management">🛡️ Risk Tips</button>
                <button class="quick-cmd-btn" data-cmd="technical analysis">📊 Technical</button>
                <button class="quick-cmd-btn" data-cmd="help">❓ Help</button>
            </div>

            <div class="chat-input-container">
                <input type="text" id="message-input" placeholder="Ask about your trading, signals, or type /help..." autocomplete="off">
                <button id="send-btn">Send</button>
            </div>
        </div>

        <aside class="mentor-sidebar">
            <div class="progress-card">
                <h3>Your Progress</h3>
                <div id="academy-progress">
                    <p style="color: var(--text-secondary); font-size: 0.875rem;">Loading...</p>
                </div>
            </div>

            <div class="stats-card">
                <h3>Quick Stats</h3>
                <div style="display: flex; flex-direction: column; gap: 0.75rem;">
                    <div style="display: flex; justify-content: space-between; font-size: 0.875rem;">
                        <span style="color: var(--text-secondary);">Questions Asked</span>
                        <span style="font-weight: 600; color: var(--accent-primary);" id="questions-count">0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 0.875rem;">
                        <span style="color: var(--text-secondary);">Lessons Started</span>
                        <span style="font-weight: 600; color: var(--accent-primary);" id="lessons-count">0</span>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script>
        // AI Mentor JavaScript - Complete Implementation
        class AIMentor {
            constructor() {
                this.apiBaseUrl = '/api/ai';
                this.chatContainer = document.getElementById('chat-messages');
                this.inputField = document.getElementById('message-input');
                this.sendButton = document.getElementById('send-btn');
                this.messageCount = 0;
                this.lessonCount = 0;

                this.init();
            }

            init() {
                // Event listeners
                this.sendButton?.addEventListener('click', () => this.sendMessage());
                this.inputField?.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.sendMessage();
                });

                // Quick command buttons
                document.querySelectorAll('.quick-cmd-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const cmd = e.target.dataset.cmd;
                        this.inputField.value = cmd;
                        this.sendMessage();
                    });
                });

                // Load progress
                this.loadProgress();

                // Welcome message
                this.addWelcomeMessage();
            }

            addWelcomeMessage() {
                this.addMessage(
                    "Welcome! I'm your AI Trading Mentor. Ask me about Forex strategies, risk management, or specific concepts and I'll recommend the best Academy lessons for you.",
                    'ai',
                    [
                        {
                            type: 'lesson',
                            title: 'Start with Fundamentals',
                            description: 'Beginner • Introduction to Forex',
                            url: '/academy.html?lesson=1',
                            metadata: { lesson_id: 1 },
                            reason: 'recommended'
                        }
                    ]
                );
            }

            async sendMessage() {
                const message = this.inputField?.value.trim();
                if (!message) return;

                // Add user message
                this.addMessage(message, 'user');
                this.inputField.value = '';
                this.messageCount++;
                this.updateStats();

                // Show typing
                this.showTyping();

                try {
                    const token = localStorage.getItem('token');
                    if (!token) {
                        this.hideTyping();
                        this.addMessage("Please log in to use the AI Mentor.", 'ai');
                        return;
                    }

                    const response = await fetch(`${this.apiBaseUrl}/mentor/ask`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            message: message,
                            context: { timestamp: new Date().toISOString() }
                        })
                    });

                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }

                    const data = await response.json();
                    console.log('[AI Mentor] Response:', data);

                    this.hideTyping();

                    // Ensure recommendations exist
                    const recommendations = data.recommendations || [];
                    if (recommendations.length === 0) {
                        console.warn('[AI Mentor] No recommendations in response');
                    }

                    this.addMessage(data.response, 'ai', recommendations);

                    if (data.academy_progress) {
                        this.updateProgressSidebar(data.academy_progress);
                    }

                } catch (error) {
                    console.error('[AI Mentor] Error:', error);
                    this.hideTyping();
                    this.addMessage(
                        "I'm having trouble connecting. Please try again.",
                        'ai',
                        [
                            {
                                type: 'lesson',
                                title: 'Browse Academy',
                                description: 'View all available lessons',
                                url: '/academy.html',
                                reason: 'recommended'
                            }
                        ]
                    );
                }
            }

            addMessage(text, sender, recommendations = []) {
                const isAI = sender === 'ai';
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isAI ? 'ai' : 'user'}`;

                let html = `
                    <div class="message-avatar">${isAI ? '🤖' : '👤'}</div>
                    <div class="message-content">
                        <div class="message-text">${this.escapeHtml(text)}</div>
                `;

                // Add lesson cards if AI message and has recommendations
                if (isAI && recommendations && recommendations.length > 0) {
                    html += this.renderLessonCards(recommendations);
                    this.lessonCount += recommendations.length;
                    this.updateStats();
                }

                html += `</div>`;
                messageDiv.innerHTML = html;

                this.chatContainer.appendChild(messageDiv);
                this.scrollToBottom();
            }

            renderLessonCards(recommendations) {
                if (!recommendations || recommendations.length === 0) {
                    console.log('[AI Mentor] No cards to render');
                    return '';
                }

                console.log(`[AI Mentor] Rendering ${recommendations.length} cards`);

                const cardsHTML = recommendations.map((rec, index) => {
                    const isNextStep = rec.reason === 'next_step';
                    const cardClass = isNextStep ? 'lesson-card-next' : 'lesson-card-recommended';
                    const badgeText = isNextStep ? 'Continue Learning' : 'Recommended';
                    const lessonId = rec.metadata?.lesson_id || '';
                    const url = rec.url || `/academy.html?lesson=${lessonId}`;

                    return `
                        <div class="lesson-card ${cardClass}" 
                             onclick="window.open('${url}', '_blank')"
                             style="margin-top: 0.75rem;">
                            <div class="lesson-card-header">
                                <span class="lesson-badge">${badgeText}</span>
                                <span class="lesson-icon">📚</span>
                            </div>
                            <div class="lesson-card-body">
                                <h4 class="lesson-title">${this.escapeHtml(rec.title)}</h4>
                                <p class="lesson-description">${this.escapeHtml(rec.description)}</p>
                            </div>
                            <button class="lesson-cta-btn">
                                ${isNextStep ? '▶ Continue' : '🎯 Start Lesson'}
                            </button>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="lesson-recommendations">
                        <div class="recommendations-label">📖 Recommended for you</div>
                        <div class="lesson-cards-container">
                            ${cardsHTML}
                        </div>
                    </div>
                `;
            }

            showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'message ai';
                typingDiv.id = 'typing-indicator';
                typingDiv.innerHTML = `
                    <div class="message-avatar">🤖</div>
                    <div class="message-content">
                        <div class="typing-indicator">
                            <div class="typing-dots">
                                <span></span>
                                <span></span>
                                <span></span>
                            </div>
                        </div>
                    </div>
                `;
                this.chatContainer.appendChild(typingDiv);
                this.scrollToBottom();
            }

            hideTyping() {
                const indicator = document.getElementById('typing-indicator');
                if (indicator) {
                    indicator.remove();
                }
            }

            scrollToBottom() {
                if (this.chatContainer) {
                    this.chatContainer.scrollTop = this.chatContainer.scrollHeight;
                }
            }

            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            async loadProgress() {
                try {
                    const token = localStorage.getItem('token');
                    if (!token) return;

                    // Decode JWT to get user ID (simplified)
                    const payload = JSON.parse(atob(token.split('.')[1]));
                    const userId = payload.sub || payload.user_id;

                    const response = await fetch(`/api/learning/progress/${userId}`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        this.updateProgressSidebar(data);
                    }
                } catch (e) {
                    console.log('[AI Mentor] Could not load progress');
                }
            }

            updateProgressSidebar(progress) {
                const container = document.getElementById('academy-progress');
                if (!container || !progress) return;

                const rate = progress.completion_rate || 0;
                const level = progress.current_level || 'Beginner';

                container.innerHTML = `
                    <div style="margin-bottom: 0.5rem;">
                        <span style="font-weight: 600; color: var(--text-primary);">${level}</span>
                        <span style="float: right; font-weight: 600; color: var(--accent-primary);">${rate}%</span>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${rate}%"></div>
                    </div>
                    <p style="font-size: 0.8125rem; color: var(--text-secondary); margin-top: 0.5rem; margin-bottom: 0;">
                        ${progress.completed_lessons || 0} of ${progress.total_lessons || 0} lessons completed
                    </p>
                `;
            }

            updateStats() {
                const qEl = document.getElementById('questions-count');
                const lEl = document.getElementById('lessons-count');
                if (qEl) qEl.textContent = this.messageCount;
                if (lEl) lEl.textContent = this.lessonCount;
            }
        }

        // Initialize
        let mentor;
        document.addEventListener('DOMContentLoaded', () => {
            mentor = new AIMentor();
        });
    </script>
</body>
</html>
