<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Professional Trading Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .auth-container { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 12px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
            width: 100%; 
            max-width: 400px; 
        }
        .brand { 
            text-align: center; 
            margin-bottom: 2rem; 
        }
        .brand h1 { 
            color: #4299e1; 
            font-size: 2.5rem; 
            margin-bottom: 0.5rem; 
        }
        .brand p { 
            color: #718096; 
        }
        .tabs { 
            display: flex; 
            margin-bottom: 1.5rem; 
            border-bottom: 2px solid #e2e8f0; 
        }
        .tab { 
            flex: 1; 
            padding: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            color: #718096; 
            font-weight: 600; 
        }
        .tab.active { 
            color: #4299e1; 
            border-bottom: 2px solid #4299e1; 
            margin-bottom: -2px; 
        }
        .form-group { 
            margin-bottom: 1rem; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 0.5rem; 
            color: #4a5568; 
            font-weight: 500; 
        }
        .form-group input { 
            width: 100%; 
            padding: 0.75rem; 
            border: 1px solid #e2e8f0; 
            border-radius: 6px; 
            font-size: 1rem; 
        }
        .form-group input:focus { 
            outline: none; 
            border-color: #4299e1; 
        }
        .btn { 
            width: 100%; 
            padding: 0.875rem; 
            border: none; 
            border-radius: 6px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .btn-primary { 
            background: #4299e1; 
            color: white; 
        }
        .btn-primary:hover { 
            background: #3182ce; 
        }
        .btn-success { 
            background: #48bb78; 
            color: white; 
            margin-top: 0.5rem; 
        }
        .alert { 
            padding: 0.75rem; 
            border-radius: 6px; 
            margin-bottom: 1rem; 
            display: none; 
        }
        .alert.error { 
            background: #fed7d7; 
            color: #c53030; 
            border: 1px solid #fc8181; 
            display: block; 
        }
        .alert.success { 
            background: #c6f6d5; 
            color: #22543d; 
            border: 1px solid #9ae6b4; 
            display: block; 
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="brand">
            <h1>Pipways</h1>
            <p>Professional Trading Platform</p>
        </div>
        
        <div id="alertBox" class="alert"></div>
        
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Login</div>
            <div class="tab" onclick="switchTab('register')">Sign Up</div>
        </div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" value="admin@pipways.com" required placeholder="admin@pipways.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" value="admin123" required placeholder="admin123">
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" required placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" required minlength="8" placeholder="Min 8 characters">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="John Doe">
            </div>
            <button type="submit" class="btn btn-success">Create Account</button>
        </form>
    </div>

    <script>
        const API_BASE = window.location.origin;
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').style.display = 'block';
                document.getElementById('registerForm').style.display = 'none';
            } else {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('registerForm').style.display = 'block';
            }
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alertBox');
            alert.textContent = message;
            alert.className = `alert ${type}`;
            setTimeout(() => alert.className = 'alert', 5000);
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            try {
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const res = await fetch(`${API_BASE}/auth/token`, {
                    method: 'POST',
                    body: formData
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Login failed');
                }
                
                const data = await res.json();
                localStorage.setItem('pipways_token', data.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(data.user));
                
                window.location.href = '/dashboard.html#/dashboard';
            } catch (e) {
                showAlert(e.message, 'error');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const data = {
                email: document.getElementById('regEmail').value,
                password: document.getElementById('regPassword').value,
                full_name: document.getElementById('regName').value
            };
            
            try {
                const res = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Registration failed');
                }
                
                const result = await res.json();
                localStorage.setItem('pipways_token', result.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(result.user));
                
                window.location.href = '/dashboard.html#/dashboard';
            } catch (e) {
                showAlert(e.message, 'error');
            }
        }
        
        // Check if already logged in
        if (localStorage.getItem('pipways_token')) {
            window.location.href = '/dashboard.html#/dashboard';
        }
    </script>
</body>
</html>
