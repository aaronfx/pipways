<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 border-r border-slate-800 p-6 flex flex-col">
            <div class="mb-8">
                <h1 class="text-2xl font-bold bg-gradient-to-r from-blue-400 to-violet-400 bg-clip-text text-transparent">Pipways</h1>
                <p class="text-xs text-slate-500">Trader Development</p>
            </div>
            
            <nav class="space-y-2 flex-1">
                <button onclick="showPage('dashboard')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg bg-blue-500/10 text-blue-400 border-r-2 border-blue-500">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </button>
                <button onclick="showPage('journal')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800">
                    <i data-lucide="camera" class="w-5 h-5"></i> Journal
                </button>
                <button onclick="showPage('discipline')" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800">
                    <i data-lucide="shield" class="w-5 h-5"></i> Discipline
                </button>
            </nav>
            
            <div class="p-4 bg-slate-800 rounded-lg">
                <div class="text-xs text-slate-400 mb-1">Level 2</div>
                <div class="w-full bg-slate-700 rounded-full h-2">
                    <div class="bg-blue-500 h-2 rounded-full" style="width: 65%"></div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto" id="content">
            <!-- Content loads here -->
        </main>
    </div>

<script>
// Data Storage (Local Browser)
const DB = {
    get: (k, d=[]) => JSON.parse(localStorage.getItem(k)||JSON.stringify(d)),
    set: (k,v) => localStorage.setItem(k, JSON.stringify(v)),
    addTrade: (t) => {
        const trades = DB.get('trades');
        trades.unshift({...t, id: Date.now(), date: new Date().toLocaleDateString()});
        DB.set('trades', trades);
        return trades;
    }
};

// Initialize sample data
if(!localStorage.getItem('init')) {
    DB.set('trades', [
        {pair: 'EURUSD', direction: 'LONG', pips: 16, grade: 'A-', date: '1/15/24'},
        {pair: 'GBPUSD', direction: 'SHORT', pips: 17, grade: 'B+', date: '1/14/24'},
        {pair: 'USDJPY', direction: 'LONG', pips: -22, grade: 'C', date: '1/13/24', flags: ['Oversizing']}
    ]);
    localStorage.setItem('init', '1');
}

function showPage(page) {
    const content = document.getElementById('content');
    const trades = DB.get('trades');
    const totalPips = trades.reduce((a,b) => a + b.pips, 0);
    const wins = trades.filter(t => t.pips > 0).length;
    const score = 87; // Calculate from flags
    
    if(page === 'dashboard') {
        content.innerHTML = `
            <h2 class="text-3xl font-bold mb-6">Dashboard</h2>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                <div class="glass rounded-xl p-6">
                    <div class="text-slate-400 text-sm mb-1">Discipline Score</div>
                    <div class="text-3xl font-bold text-blue-400">${score}</div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="text-slate-400 text-sm mb-1">Win Rate</div>
                    <div class="text-3xl font-bold text-violet-400">${(wins/trades.length*100).toFixed(0)}%</div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="text-slate-400 text-sm mb-1">Total Pips</div>
                    <div class="text-3xl font-bold ${totalPips>=0?'text-emerald-400':'text-red-400'}">${totalPips>0?'+':''}${totalPips}</div>
                </div>
                <div class="glass rounded-xl p-6">
                    <div class="text-slate-400 text-sm mb-1">Trades</div>
                    <div class="text-3xl font-bold text-orange-400">${trades.length}</div>
                </div>
            </div>
            <div class="glass rounded-xl p-6">
                <h3 class="font-semibold mb-4">Recent Trades</h3>
                <div class="space-y-3">
                    ${trades.map(t => `
                        <div class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg">
                            <div class="flex items-center gap-4">
                                <span class="font-bold">${t.pair}</span>
                                <span class="px-2 py-1 rounded text-xs ${t.direction==='LONG'?'bg-emerald-500/20 text-emerald-400':'bg-red-500/20 text-red-400'}">${t.direction}</span>
                                <span class="font-mono ${t.pips>=0?'text-emerald-400':'text-red-400'}">${t.pips>0?'+':''}${t.pips}</span>
                            </div>
                            <span class="px-2 py-1 rounded bg-slate-700 text-xs font-bold">${t.grade}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;
    } else if(page === 'journal') {
        content.innerHTML = `
            <h2 class="text-3xl font-bold mb-6">Trade Journal</h2>
            <div class="glass rounded-xl p-8 mb-6 text-center border-2 border-dashed border-slate-700">
                <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-blue-500/20 flex items-center justify-center">
                    <i data-lucide="upload-cloud" class="w-8 h-8 text-blue-400"></i>
                </div>
                <p class="text-lg mb-4">Log your trade manually</p>
                <form onsubmit="addTrade(event)" class="max-w-md mx-auto grid grid-cols-2 gap-4 text-left">
                    <input name="pair" placeholder="Pair (EURUSD)" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2" required>
                    <select name="direction" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2">
                        <option>LONG</option><option>SHORT</option>
                    </select>
                    <input name="pips" type="number" placeholder="Pips (+/-)" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2" required>
                    <select name="grade" class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2">
                        <option>A</option><option>B</option><option>C</option>
                    </select>
                    <button type="submit" class="col-span-2 bg-blue-500 hover:bg-blue-600 rounded-lg py-2 font-medium">Add Trade</button>
                </form>
            </div>
        `;
    } else if(page === 'discipline') {
        content.innerHTML = `
            <h2 class="text-3xl font-bold mb-6">Discipline Score</h2>
            <div class="glass rounded-xl p-12 text-center">
                <div class="inline-flex items-center justify-center w-32 h-32 rounded-full bg-gradient-to-br from-blue-500/20 to-violet-500/20 border-4 border-blue-500/30 mb-4">
                    <span class="text-5xl font-bold">87</span>
                </div>
                <p class="text-xl text-slate-300 mb-2">Disciplined Trader</p>
                <p class="text-slate-500">Top 15% of users</p>
            </div>
        `;
    }
    lucide.createIcons();
}

function addTrade(e) {
    e.preventDefault();
    const f = e.target;
    DB.addTrade({
        pair: f.pair.value,
        direction: f.direction.value,
        pips: parseInt(f.pips.value),
        grade: f.grade.value
    });
    showPage('dashboard');
}

// Load initial page
showPage('dashboard');
lucide.createIcons();
</script>
</body>
</html>
