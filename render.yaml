# Render Blueprint for Pipways Trading Platform v3.2

services:
  # API SERVICE
  - type: web
    name: pipways-api-nhem
    runtime: python
    region: oregon
    plan: standard
    branch: main
    
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db-nhem
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "https://pipways-web-nhem.onrender.com,https://*.onrender.com,http://localhost:3000"
    
    autoDeploy: true

  # FRONTEND SERVICE - FIXED PUBLISH PATH
  - type: web
    name: pipways-web-nhem
    runtime: static
    region: oregon
    plan: standard
    branch: main
    
    buildCommand: ""  # No build needed for static HTML
    staticPublishPath: .  # ← CORRECTED: Serve from root where index.html is
    
    routes:
      - type: rewrite
        source: /(.*)
        destination: /index.html
    
    autoDeploy: true

databases:
  - name: pipways-db-nhem
    region: oregon
    plan: standard
    postgresMajorVersion: 15
