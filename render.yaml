services:
  - type: web
    name: pipways-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONPATH
        value: /opt/render/project/src
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Auto-generate if not set, or set manually in dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://yourdomain.com,https://www.yourdomain.com"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
    healthCheckPath: /health

databases:
  - name: pipways-db
    databaseName: pipways
    plan: standard
    ipAllowList: []
