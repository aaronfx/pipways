services:
  - type: web
    name: pipways-app
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      mkdir -p uploads
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: pipways-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_EMAIL
        value: admin@pipways.com
      - key: ADMIN_PASSWORD
        value: admin123
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: pipways-db
    plan: free
