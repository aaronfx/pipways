<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways — Trading Education & Research</title>
    <!-- Silence Tailwind CDN development warning (safe in production) -->
    <script>
    (function() {
        const _warn = console.warn.bind(console);
        console.warn = function(...a) {
            if (typeof a[0] === 'string' && a[0].includes('cdn.tailwindcss.com')) return;
            _warn(...a);
        };
    })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Quill rich-text editor (blog editor only) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        /* ── Scrollbar ── */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

        /* ── Animations ── */
        @keyframes fadeIn  { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        @keyframes ticker  { 0% { transform:translateX(0); } 100% { transform:translateX(-50%); } }
        @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.4;} }
        @keyframes countUp { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
        @keyframes glowPulse { 0%,100%{box-shadow:0 0 0 0 rgba(124,58,237,0);} 50%{box-shadow:0 0 12px 2px rgba(124,58,237,0.25);} }
        @keyframes shimmer { 0%{background-position:-400px 0;} 100%{background-position:400px 0;} }
        .shimmer-line { height:12px; border-radius:6px; background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%); background-size:800px 100%; animation:shimmer 1.4s ease-in-out infinite; }
        .shimmer-line-sm { height:8px; border-radius:4px; background:linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%); background-size:800px 100%; animation:shimmer 1.4s ease-in-out infinite; }
        /* ── Touch: pause ticker ── */
        .ticker-track { touch-action: none; }
        .animate-fade-in { animation: fadeIn 0.45s ease-out both; }
        .count-animate    { animation: countUp 0.4s ease-out both; }

        /* ── Chart containers ── */
        .chart-container { position:relative; height:300px; width:100%; }

        /* ── Ticker ── */
        .ticker-wrap { overflow:hidden; background:linear-gradient(90deg,#0f172a,#1e1b4b,#0f172a); border-bottom:1px solid #1e293b; padding:0.4rem 0; }
        .ticker-track { display:flex; gap:0; width:max-content; animation: ticker 35s linear infinite; }
        .ticker-track:hover { animation-play-state:paused; }
        .ticker-item { display:flex; align-items:center; gap:0.5rem; padding:0 2rem; border-right:1px solid #1e293b; white-space:nowrap; font-size:0.78rem; }
        .ticker-sym  { font-weight:700; color:#e2e8f0; letter-spacing:.03em; }
        .ticker-price{ color:#94a3b8; font-family:monospace; }
        .ticker-up   { color:#34d399; font-weight:600; }
        .ticker-dn   { color:#f87171; font-weight:600; }

        /* ── Sidebar polish (kept for compatibility) ── */

        /* ── Chart analysis ── */
        .upload-area { border:2px dashed #4b5563; border-radius:.75rem; padding:2rem; text-align:center; cursor:pointer; transition:all .2s; background:#111827; }
        .upload-area:hover { border-color:#7c3aed; background:#1f2937; }
        .card { background:#1f2937; border:1px solid #374151; border-radius:.75rem; padding:1.5rem; }
        .card-header { margin-bottom:1rem; padding-bottom:1rem; border-bottom:1px solid #374151; }
        .card-title  { font-size:1.125rem; font-weight:600; color:white; margin:0; }
        .card-body   { padding:1rem 0 0; }
        .form-group  { margin-bottom:1rem; }
        .form-group label { display:block; font-size:.875rem; color:#9ca3af; margin-bottom:.5rem; }
        .form-control { width:100%; background:#111827; border:1px solid #374151; border-radius:.5rem; padding:.5rem .75rem; color:white; box-sizing:border-box; }
        .form-control:focus { outline:none; border-color:#7c3aed; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:.5rem; padding:.5rem 1rem; border-radius:.5rem; font-weight:500; cursor:pointer; border:none; transition:all .2s; }
        .btn-primary { background:#7c3aed; color:white; }
        .btn-primary:hover { background:#6d28d9; }
        .btn-success { background:#059669; color:white; }
        .btn-success:hover { background:#047857; }
        .btn-block { width:100%; }
        .badge { display:inline-flex; align-items:center; padding:.25rem .75rem; border-radius:9999px; font-size:.75rem; font-weight:600; }
        .badge-success   { background:rgba(16,185,129,.2); color:#34d399; }
        .badge-warning   { background:rgba(245,158,11,.2);  color:#fbbf24; }
        .badge-info      { background:rgba(59,130,246,.2);  color:#60a5fa; }
        .badge-danger    { background:rgba(239,68,68,.2);   color:#f87171; }
        .badge-secondary { background:rgba(107,114,128,.2); color:#9ca3af; }
        .badge-primary   { background:rgba(124,58,237,.2);  color:#a78bfa; }
        .alert      { padding:1rem; border-radius:.5rem; margin-bottom:1rem; }
        .alert-error{ background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:#f87171; }
        .loading    { text-align:center; padding:2rem; }
        .spinner    { width:40px; height:40px; border:3px solid #374151; border-top-color:#7c3aed; border-radius:50%; animation:spin 1s linear infinite; margin:0 auto 1rem; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .text-primary { color:#7c3aed; } .text-success { color:#10b981; } .text-danger { color:#ef4444; }
        .text-warning { color:#f59e0b; } .text-muted   { color:#6b7280; }
        .mr-2 { margin-right:.5rem; } .mt-1 { margin-top:.25rem; } .mb-0 { margin-bottom:0 !important; }
        .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        /* ── Toast notifications ── */
        .pw-toast { position:fixed; bottom:1.5rem; right:1.5rem; z-index:99999; display:flex; align-items:center; gap:.75rem;
            padding:.75rem 1.1rem; border-radius:.75rem; font-size:.83rem; font-weight:600; max-width:340px;
            box-shadow:0 12px 40px rgba(0,0,0,.55); animation:fadeIn .3s ease-out both; pointer-events:none; }
        .pw-toast.success { background:rgba(16,185,129,.92); color:white; border:1px solid rgba(52,211,153,.4); }
        .pw-toast.error   { background:rgba(239,68,68,.92);  color:white; border:1px solid rgba(248,113,113,.4); }
        .pw-toast.info    { background:rgba(59,130,246,.92); color:white; border:1px solid rgba(96,165,250,.4); }
        .pw-toast.warning { background:rgba(245,158,11,.92); color:white; border:1px solid rgba(251,191,36,.4); }
        @keyframes toast-out { to { opacity:0; transform:translateX(110%); } }
        /* ── Stat chip count-up ── */
        .stat-updated { animation: glowPulse .6s ease-out; }

        /* ── New dashboard cards ── */
        .pw-card { background:#111827; border:1px solid #1f2937; border-radius:1rem; transition:border-color .2s, box-shadow .2s, transform .2s; }
        /* REC: standardised hover — all cards use translateY(-2px) + shadow */
        .pw-card:hover { border-color:#374151; box-shadow:0 8px 24px -6px rgba(0,0,0,.5); transform:translateY(-1px); }
        .pw-card-hdr { display:flex; align-items:center; justify-content:space-between; padding:1rem 1.25rem; border-bottom:1px solid #1f2937; }
        .pw-card-body { padding:1.25rem; }
        .pw-section-label { font-size:.68rem; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:#4b5563; }
        /* REC: thicker progress bars (10px) are more visible + motivating on a learning platform */
        .pw-progress-bar { height:10px; background:#1f2937; border-radius:5px; overflow:hidden; }
        .pw-progress-fill { height:100%; border-radius:5px; background:linear-gradient(90deg,#7c3aed,#6d28d9); transition:width .6s ease; }
        /* REC: near-done glow at 80–99% makes progress feel exciting */
        .pw-progress-fill.near-done { background:linear-gradient(90deg,#7c3aed,#a78bfa); box-shadow:0 0 8px rgba(167,139,250,.45); }
        .pw-tool-btn { display:flex; align-items:center; gap:.75rem; padding:.85rem 1rem; background:#111827; border:1px solid #1f2937; border-radius:.75rem; cursor:pointer; transition:all .18s; text-decoration:none; }
        .pw-tool-btn:hover { border-color:var(--tc); background:rgba(var(--tr),.08); transform:translateY(-2px); box-shadow:0 6px 20px -4px rgba(0,0,0,.45); }
        .pw-tool-icon { width:38px; height:38px; border-radius:.6rem; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:1rem; }
        /* REC: stat chip hover standardised */
        .pw-stat-chip { background:#1f2937; border:1px solid #374151; border-radius:.65rem; padding:.75rem 1rem; text-align:center; transition:transform .2s, box-shadow .2s; }
        .pw-stat-chip:hover { transform:translateY(-2px); box-shadow:0 8px 24px -6px rgba(0,0,0,.5); }
        .pw-course-item { display:flex; align-items:flex-start; gap:.85rem; padding:.85rem 0; border-bottom:1px solid #1f2937; }
        .pw-course-item:last-child { border-bottom:none; padding-bottom:0; }
        .pw-blog-item { display:flex; gap:.75rem; padding:.75rem 0; border-bottom:1px solid #1f2937; align-items:flex-start; }
        .pw-blog-item:last-child { border-bottom:none; padding-bottom:0; }
        /* ── Nav sections — REC: bumped from #374151 to #6b7280 for readability ── */
        .nav-section-label { font-size:.62rem; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:#6b7280; padding:.6rem .75rem .25rem; margin-top:.5rem; }
        /* ── Breadcrumb ── */
        .pw-breadcrumb { display:flex; align-items:center; gap:.4rem; font-size:.75rem; color:#6b7280; flex-wrap:wrap; }
        .pw-breadcrumb a { color:#a78bfa; text-decoration:none; transition:color .15s; }
        .pw-breadcrumb a:hover { color:#c4b5fd; }
        .pw-breadcrumb-sep { color:#374151; font-size:.65rem; }
        /* ── Consistent empty state ── */
        .pw-empty { text-align:center; padding:3.5rem 1rem; }
        .pw-empty-icon { width:60px; height:60px; border-radius:50%; border:2px dashed #374151; display:flex; align-items:center; justify-content:center; margin:0 auto 1rem; background:#0d1117; }
        .pw-empty-title { font-size:.9rem; font-weight:600; color:#6b7280; margin-bottom:.35rem; }
        .pw-empty-sub   { font-size:.78rem; color:#4b5563; }

        /* ── Mobile improvements ── */
        @media (max-width: 767px) {
            .pw-card-body { padding:1rem; }
            .pw-card-hdr  { padding:.75rem 1rem; }
            .pw-tool-btn  { padding:.65rem .85rem; }
            .pw-stat-chip { padding:.65rem .85rem; }
            /* Mobile dashboard card order: stat > learn > ai > insight > tools > perf > courses > blog */
            #dash-stat-row   { order:1; }
            #dash-learn-row  { order:2; }
            #ai-insight-card { order:3; }
            #dash-tools-row  { order:4; }
            #dash-perf-row   { order:5; }
            #dash-blog-row   { order:6; }
            /* Snap the lg:col-span-3 grid to single column cleanly */
            .lg\:col-span-2 { grid-column: span 1; }
            .lg\:col-span-1 { grid-column: span 1; }
        }
        /* ── Section reveal (always animate on show) ── */
        .section:not(.hidden) { animation: fadeIn .3s ease-out both; }
        .nav-link { position:relative; display:flex; align-items:center; gap:.75rem; padding:.5rem .75rem; border-radius:.6rem; color:#6b7280; transition:all .15s; font-size:.83rem; font-weight:500; text-decoration:none; }
        .nav-link:hover:not(.active) { background:#111827; color:#e5e7eb; }
        .nav-link.active { background:linear-gradient(90deg,#7c3aed,#6d28d9) !important; color:white; box-shadow:0 4px 14px rgba(124,58,237,.35); }
        /* REC: force active nav icons white so coloured inline styles don't bleed through */
        .nav-link.active i, .nav-link.active:hover i { color:white !important; }
        .nav-link.active:hover { color:white !important; opacity:.95; }
        .nav-link .nav-icon { width:16px; text-align:center; font-size:.8rem; flex-shrink:0; }
        /* ── Toast stack offset — REC: consecutive toasts don't overlap ── */
        .pw-toast { transition:bottom .25s ease; }
        /* ── Blog thumbnail consistency ── */
        .pw-blog-thumb { height:112px; border-radius:.5rem .5rem 0 0; overflow:hidden; position:relative; }
        .pw-blog-thumb img { width:100%; height:100%; object-fit:cover; }
        .pw-blog-thumb-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center;
            background:linear-gradient(135deg,rgba(20,184,166,.12),rgba(59,130,246,.08)); }
        /* ── Mobile sidebar tap hint ── */
        .sidebar-tap-hint { font-size:.67rem; color:#4b5563; text-align:center; padding:.3rem 0 0; }
        @media (min-width:768px) { .sidebar-tap-hint { display:none; } }
        /* ── Curriculum lesson row completed state ── */
        .lesson-row-done { background:rgba(16,185,129,.04); }
        .lesson-row-done .lesson-title { text-decoration:line-through; color:#6b7280 !important; }
        /* ── Stat chip sub-label ── */
        .pw-stat-sub { font-size:.67rem; color:#6b7280; margin-top:.2rem; min-height:.9rem; }
    </style>
</head>
<body class="bg-gray-900 text-white h-screen overflow-hidden flex flex-col md:flex-row">

    <!-- Mobile Menu Button -->
    <div class="md:hidden fixed top-3.5 left-4 z-50">
        <button id="mobile-menu-btn"
                class="flex items-center gap-2 px-3 py-2 rounded-lg shadow-xl text-white text-sm font-medium transition-all"
                style="background:linear-gradient(135deg,#7c3aed,#6d28d9);border:1px solid rgba(167,139,250,.3);">
            <i class="fas fa-bars text-xs"></i>
            <span class="text-xs font-semibold tracking-wide" style="letter-spacing:.04em;">PW</span>
        </button>

    <!-- Sidebar Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-40 hidden md:hidden backdrop-blur-sm"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-64 h-screen bg-gray-900 border-r border-gray-800 z-50 flex flex-col transform -translate-x-full md:translate-x-0 transition-transform duration-300"
          style="box-shadow: 4px 0 24px rgba(0,0,0,.5);">

        <div class="sidebar-tap-hint px-3 pb-1">Tap outside to close</div>

        <div class="p-4 border-t border-gray-800">
            <!-- User profile -->
            <div class="flex items-center gap-2.5 mb-3 p-2.5 rounded-xl" style="background:#111827;border:1px solid #1f2937;">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-purple-500 to-pink-500 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-user text-xs"></i>
