<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gopipways</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-4 backdrop-blur">
                <i class="fas fa-chart-line text-3xl text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Gopipways</h1>
            <p class="text-white/80">Professional Trading Platform</p>
        </div>

        <div class="bg-white rounded-2xl shadow-2xl p-8">
            <!-- Error Message -->
            <div id="error-message" class="hidden mb-4 p-4 rounded-lg bg-red-50 text-red-600 text-sm border border-red-200">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="error-text">Login failed</span>
            </div>
            <!-- Success Message -->
            <div id="success-message" class="hidden mb-4 p-4 rounded-lg bg-green-50 text-green-600 text-sm border border-green-200">
                <i class="fas fa-check-circle mr-2"></i>
                <span id="success-text">Success!</span>
            </div>

            <div class="flex mb-6 border-b border-gray-200">
                <button onclick="switchTab('login')" id="tab-login"
                    class="flex-1 pb-3 text-center font-medium text-blue-600 border-b-2 border-blue-600 transition-colors">
                    Login
                </button>
                <button onclick="switchTab('signup')" id="tab-signup"
                    class="flex-1 pb-3 text-center font-medium text-gray-500 hover:text-gray-700 transition-colors">
                    Sign Up
                </button>
            </div>

            <!-- LOGIN FORM -->
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="login-email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="Enter your email">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <input type="password" id="login-password" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="Enter your password">
                        <button type="button" onclick="togglePassword('login-password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="login-btn"
                    class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                    <span id="login-btn-text">Sign In</span>
                    <i class="fas fa-arrow-right" id="login-btn-icon"></i>
                    <div id="login-spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signup-form" onsubmit="handleSignup(event)" class="hidden space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="signup-name" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="Enter your full name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="signup-email" required
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                        placeholder="Enter your email">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <div class="relative">
                        <!-- FIX: minlength changed 6→8 to match backend reset endpoint requirement -->
                        <input type="password" id="signup-password" required minlength="8"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                            placeholder="Create password (min 8 characters)">
                        <button type="button" onclick="togglePassword('signup-password')"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="signup-btn"
                    class="w-full py-3 bg-gradient-to-r from-blue-600 to-purple-600 text-white rounded-lg font-semibold hover:shadow-lg transform hover:-translate-y-0.5 transition-all flex items-center justify-center gap-2">
                    <span id="signup-btn-text">Create Account</span>
                    <i class="fas fa-user-plus" id="signup-btn-icon"></i>
                    <div id="signup-spinner" class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                </button>
            </form>

            <!-- FIX: Forgot password now calls ForgotPassword.show() from forgot_password.js -->
            <div class="mt-6 pt-6 border-t border-gray-200 text-center">
                <a href="#" id="forgot-password-link" onclick="ForgotPassword.show(); return false;"
                    class="text-sm text-blue-600 hover:underline">
                    Forgot password?
                </a>
            </div>
        </div>

        <!-- FIX: year updated 2025→2026 -->
        <p class="text-center text-white/70 text-sm mt-8">
            © 2026 Gopipways. All rights reserved.
        </p>
    </div>

    <script>
        const API_BASE = window.location.origin;

        function switchTab(tab) {
            const loginForm  = document.getElementById('login-form');
            const signupForm = document.getElementById('signup-form');
            const loginTab   = document.getElementById('tab-login');
            const signupTab  = document.getElementById('tab-signup');
            if (tab === 'login') {
                loginForm.classList.remove('hidden');
                signupForm.classList.add('hidden');
                loginTab.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
                loginTab.classList.remove('text-gray-500');
                signupTab.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                signupTab.classList.add('text-gray-500');
            } else {
                loginForm.classList.add('hidden');
                signupForm.classList.remove('hidden');
                signupTab.classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
                signupTab.classList.remove('text-gray-500');
                loginTab.classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
                loginTab.classList.add('text-gray-500');
            }
            hideMessages();
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon  = input.parentElement.querySelector('button i');
            if (input.type === 'password') {
                input.type = 'text';
                if (icon) { icon.classList.remove('fa-eye'); icon.classList.add('fa-eye-slash'); }
            } else {
                input.type = 'password';
                if (icon) { icon.classList.remove('fa-eye-slash'); icon.classList.add('fa-eye'); }
            }
        }

        function showError(message) {
            document.getElementById('error-text').textContent = message;
            document.getElementById('error-message').classList.remove('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }

        function showSuccess(message) {
            document.getElementById('success-text').textContent = message;
            document.getElementById('success-message').classList.remove('hidden');
            document.getElementById('error-message').classList.add('hidden');
        }

        function hideMessages() {
            document.getElementById('error-message').classList.add('hidden');
            document.getElementById('success-message').classList.add('hidden');
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideMessages();
            const btn     = document.getElementById('login-btn');
            const btnText = document.getElementById('login-btn-text');
            const btnIcon = document.getElementById('login-btn-icon');
            const spinner = document.getElementById('login-spinner');
            btn.disabled = true;
            btnText.textContent = 'Signing In...';
            btnIcon.classList.add('hidden');
            spinner.classList.remove('hidden');
            try {
                const email    = document.getElementById('login-email').value;
                const password = document.getElementById('login-password').value;
                const params   = new URLSearchParams();
                params.append('username', email);
                params.append('password', password);
                const response = await fetch(`${API_BASE}/auth/token`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded', 'Accept': 'application/json' },
                    body: params
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `Authentication failed (${response.status})`);
                }
                const data = await response.json();
                localStorage.setItem('pipways_token', data.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(data.user));
                showSuccess('Login successful! Redirecting...');
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 800);
            } catch (error) {
                console.error('[Auth Error]', error);
                showError(error.message || 'Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
                btnIcon.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            hideMessages();
            const btn     = document.getElementById('signup-btn');
            const btnText = document.getElementById('signup-btn-text');
            const btnIcon = document.getElementById('signup-btn-icon');
            const spinner = document.getElementById('signup-spinner');
            btn.disabled = true;
            btnText.textContent = 'Creating Account...';
            btnIcon.classList.add('hidden');
            spinner.classList.remove('hidden');
            try {
                const full_name = document.getElementById('signup-name').value;
                const email     = document.getElementById('signup-email').value;
                const password  = document.getElementById('signup-password').value;
                const response  = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify({ full_name, email, password })
                });
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || `Registration failed (${response.status})`);
                }
                const data = await response.json();
                localStorage.setItem('pipways_token', data.access_token);
                localStorage.setItem('pipways_user', JSON.stringify(data.user));
                showSuccess('Account created! Redirecting...');
                setTimeout(() => { window.location.href = '/dashboard.html'; }, 1200);
            } catch (error) {
                console.error('[Signup Error]', error);
                showError(error.message || 'Network error. Please try again.');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                btnIcon.classList.remove('hidden');
                spinner.classList.add('hidden');
            }
        }

        // Redirect if already logged in
        if (localStorage.getItem('pipways_token')) {
            window.location.href = '/dashboard.html';
        }
    </script>

    <!-- Forgot password modal — must load after inline script -->
    <script src="/js/forgot_password.js"></script>
</body>
</html>
