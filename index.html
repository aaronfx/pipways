<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Trading Education Platform</title>
    <!-- REMOVED: <base target="_blank"> -->
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 600; }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 0.5rem;
        }
        button:hover { background: #5568d3; }
        .toggle {
            text-align: center;
            margin-top: 1rem;
            color: #666;
        }
        .toggle a {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
        }
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        .success {
            color: #27ae60;
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.9rem;
        }
        #dashboard { display: none; }
        .nav {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #e0e0e0;
        }
        .nav button {
            width: auto;
            padding: 0.5rem 1rem;
            margin: 0;
        }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body>
    <!-- Login/Register Forms -->
    <div class="container" id="auth-container">
        <h1>Pipways</h1>
        
        <!-- Login Form -->
        <div id="login-section">
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required placeholder="Enter your password">
                </div>
                <button type="submit">Login</button>
            </form>
            <div class="toggle">
                Don't have an account? <a onclick="showRegister()">Register</a>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-section" style="display: none;">
            <form id="register-form" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required minlength="8" placeholder="Min 8 characters">
                </div>
                <button type="submit">Create Account</button>
            </form>
            <div class="toggle">
                Already have an account? <a onclick="showLogin()">Login</a>
            </div>
        </div>

        <div id="message"></div>
    </div>

    <!-- Dashboard -->
    <div class="container" id="dashboard" style="display: none; max-width: 800px;">
        <div class="nav">
            <h2>Dashboard</h2>
            <button onclick="logout()">Logout</button>
        </div>
        
        <div class="nav">
            <button onclick="showSection('journal')">Trade Journal</button>
            <button onclick="showSection('analysis')">AI Analysis</button>
            <button onclick="showSection('courses')">Courses</button>
            <button onclick="showSection('webinars')">Webinars</button>
        </div>

        <div id="journal-section" class="section active">
            <h3>Trade Journal</h3>
            <form id="trade-form" onsubmit="handleTrade(event)">
                <div class="form-group">
                    <label>Currency Pair</label>
                    <input type="text" name="pair" placeholder="EURUSD" required>
                </div>
                <div class="form-group">
                    <label>Direction</label>
                    <select name="direction" style="width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 5px;">
                        <option value="LONG">LONG</option>
                        <option value="SHORT">SHORT</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Pips</label>
                    <input type="number" name="pips" step="0.1" placeholder="+25.5 or -10.2" required>
                </div>
                <div class="form-group">
                    <label>Grade</label>
                    <select name="grade" style="width: 100%; padding: 0.75rem; border: 2px solid #e0e0e0; border-radius: 5px;">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C" selected>C</option>
                        <option value="D">D</option>
                        <option value="F">F</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" name="notes" placeholder="Trade notes...">
                </div>
                <button type="submit">Log Trade</button>
            </form>
            <div id="trades-list"></div>
        </div>

        <div id="analysis-section" class="section">
            <h3>AI Chart Analysis</h3>
            <p>Upload your chart for AI analysis</p>
            <input type="file" id="chart-file" accept="image/*">
            <button onclick="analyzeChart()" style="margin-top: 1rem;">Analyze</button>
            <div id="analysis-result"></div>
        </div>

        <div id="courses-section" class="section">
            <h3>Available Courses</h3>
            <div id="courses-list">Loading...</div>
        </div>

        <div id="webinars-section" class="section">
            <h3>Upcoming Webinars</h3>
            <div id="webinars-list">Loading...</div>
        </div>
    </div>

    <script>
        // ==========================================
        // API Configuration - FIXED URL
        // ==========================================
        const API_URL = 'https://pipways-api-nhem.onrender.com';
        const REQUEST_TIMEOUT = 30000;

        // ==========================================
        // Auth Functions
        // ==========================================
        
        function showLogin() {
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('register-section').style.display = 'none';
            document.getElementById('message').innerHTML = '';
        }

        function showRegister() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('register-section').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const msgDiv = document.getElementById('message');
            
            try {
                const formData = new URLSearchParams();
                // FIXED: Changed from 'username' to 'email'
                formData.append('email', form.email.value);
                formData.append('password', form.password.value);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showDashboard();
                } else {
                    msgDiv.innerHTML = `<div class="error">${data.detail || 'Login failed'}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const msgDiv = document.getElementById('message');

            if (form.password.value.length < 8) {
                msgDiv.innerHTML = `<div class="error">Password must be at least 8 characters</div>`;
                return;
            }

            try {
                const formData = new URLSearchParams();
                formData.append('email', form.email.value);
                formData.append('password', form.password.value);
                formData.append('full_name', form.full_name.value);

                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.access_token);
                    msgDiv.innerHTML = `<div class="success">Account created! Logging in...</div>`;
                    setTimeout(() => showDashboard(), 1000);
                } else {
                    msgDiv.innerHTML = `<div class="error">${data.detail || 'Registration failed'}</div>`;
                }
            } catch (error) {
                msgDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            document.getElementById('auth-container').style.display = 'block';
            document.getElementById('dashboard').style.display = 'none';
        }

        // ==========================================
        // Dashboard Functions
        // ==========================================

        function showDashboard() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            loadCourses();
            loadWebinars();
        }

        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${section}-section`).classList.add('active');
        }

        async function handleTrade(e) {
            e.preventDefault();
            const form = e.target;
            const token = localStorage.getItem('token');

            try {
                const formData = new URLSearchParams();
                formData.append('pair', form.pair.value);
                formData.append('direction', form.direction.value);
                formData.append('pips', form.pips.value);
                formData.append('grade', form.grade.value);
                formData.append('notes', form.notes.value);

                const response = await fetch(`${API_URL}/trades`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    alert('Trade logged successfully!');
                    form.reset();
                } else {
                    alert(data.detail || 'Failed to log trade');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function loadCourses() {
            try {
                const response = await fetch(`${API_URL}/courses`);
                const data = await response.json();
                
                const list = document.getElementById('courses-list');
                if (data.courses && data.courses.length > 0) {
                    list.innerHTML = data.courses.map(c => `
                        <div style="padding: 1rem; border: 1px solid #e0e0e0; margin-bottom: 0.5rem; border-radius: 5px;">
                            <h4>${c.title}</h4>
                            <p>${c.description || 'No description'}</p>
                            <small>Level: ${c.level}</small>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No courses available</p>';
                }
            } catch (error) {
                document.getElementById('courses-list').innerHTML = '<p>Error loading courses</p>';
            }
        }

        async function loadWebinars() {
            try {
                const response = await fetch(`${API_URL}/webinars`);
                const data = await response.json();
                
                const list = document.getElementById('webinars-list');
                if (data.webinars && data.webinars.length > 0) {
                    list.innerHTML = data.webinars.map(w => `
                        <div style="padding: 1rem; border: 1px solid #e0e0e0; margin-bottom: 0.5rem; border-radius: 5px;">
                            <h4>${w.title}</h4>
                            <p>${w.description || 'No description'}</p>
                            <small>Date: ${new Date(w.scheduled_at).toLocaleString()}</small>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = '<p>No upcoming webinars</p>';
                }
            } catch (error) {
                document.getElementById('webinars-list').innerHTML = '<p>Error loading webinars</p>';
            }
        }

        async function analyzeChart() {
            const fileInput = document.getElementById('chart-file');
            const resultDiv = document.getElementById('analysis-result');
            const token = localStorage.getItem('token');

            if (!fileInput.files[0]) {
                alert('Please select an image');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('image', fileInput.files[0]);

                resultDiv.innerHTML = '<p>Analyzing...</p>';

                const response = await fetch(`${API_URL}/analyze/chart`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                    },
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    resultDiv.innerHTML = `<div style="margin-top: 1rem; padding: 1rem; background: #f0f0f0; border-radius: 5px;"><h4>Analysis:</h4><p>${data.analysis}</p></div>`;
                } else {
                    resultDiv.innerHTML = `<div class="error">Analysis failed</div>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }

        // ==========================================
        // Initialize
        // ==========================================
        
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (token) {
                showDashboard();
            }
        });
    </script>
</body>
</html>
