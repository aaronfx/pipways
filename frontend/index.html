<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            margin: 0; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            font-family: system-ui, -apple-system, sans-serif;
        }
        .auth-container {
            background: white;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo { margin-bottom: 2rem; }
        .logo h1 { 
            color: #3b82f6; 
            margin: 0; 
            font-size: 2.5rem;
        }
        .logo p { 
            color: #64748b; 
            margin-top: 0.5rem;
        }
        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .tab-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #64748b;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            font-size: 1rem;
        }
        .tab-btn.active {
            color: #3b82f6;
            border-bottom-color: #3b82f6;
        }
        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #374151;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            font-size: 1rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: white;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-block {
            width: 100%;
            padding: 0.875rem;
            font-size: 1rem;
            margin-top: 0.5rem;
        }
        .alert {
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            display: none;
            text-align: left;
        }
        .alert-error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
        .alert-success { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0; }
        .switch-link {
            margin-top: 1rem;
            color: #64748b;
            font-size: 0.875rem;
        }
        .switch-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>Pipways</h1>
            <p>Professional Trading Platform</p>
        </div>
        
        <div id="alertBox" class="alert"></div>

        <div class="auth-tabs">
            <button class="tab-btn active" onclick="showLogin()">Login</button>
            <button class="tab-btn" onclick="showRegister()">Sign Up</button>
        </div>

        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="username" placeholder="your@email.com" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <form id="registerForm" class="auth-form" style="display:none" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="your@email.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Min 8 characters" required minlength="8">
            </div>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="John Doe" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>
        
        <div class="switch-link">
            <span id="switchText">Don't have an account? <a href="#" onclick="showRegister(); return false;">Sign up</a></span>
        </div>
    </div>

    <script>
        // Check if already logged in
        const token = localStorage.getItem('token');
        if (token) {
            window.location.href = '/dashboard.html';
        }

        function showLogin() {
            document.getElementById('loginForm').style.display = 'flex';
            document.getElementById('registerForm').style.display = 'none';
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
            document.getElementById('switchText').innerHTML = 'Don\'t have an account? <a href="#" onclick="showRegister(); return false;">Sign up</a>';
        }

        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'flex';
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
            document.getElementById('switchText').innerHTML = 'Already have an account? <a href="#" onclick="showLogin(); return false;">Login</a>';
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alertBox');
            alert.textContent = message;
            alert.className = `alert alert-${type}`;
            alert.style.display = 'block';
            setTimeout(() => alert.style.display = 'none', 5000);
        }

        const API_URL = window.location.hostname === 'localhost' 
            ? 'http://localhost:8000' 
            : 'https://pipwaysapp.onrender.com';

        async function handleLogin(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const username = formData.get('username');
            const password = formData.get('password');

            try {
                const form = new FormData();
                form.append('username', username);
                form.append('password', password);

                const res = await fetch(`${API_URL}/auth/token`, {
                    method: 'POST',
                    body: form
                });

                if (!res.ok) throw new Error('Invalid credentials');
                
                const data = await res.json();
                localStorage.setItem('token', data.access_token);
                if (data.user) localStorage.setItem('user', JSON.stringify(data.user));
                
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 500);
            } catch (err) {
                showAlert(err.message);
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Registration failed');
                }

                const loginForm = new FormData();
                loginForm.append('username', data.email);
                loginForm.append('password', data.password);
                
                const loginRes = await fetch(`${API_URL}/auth/token`, {
                    method: 'POST',
                    body: loginForm
                });

                const loginData = await loginRes.json();
                localStorage.setItem('token', loginData.access_token);
                if (loginData.user) localStorage.setItem('user', JSON.stringify(loginData.user));

                showAlert('Account created! Redirecting...', 'success');
                setTimeout(() => window.location.href = '/dashboard.html', 500);
            } catch (err) {
                showAlert(err.message);
            }
        }
    </script>
</body>
</html>
