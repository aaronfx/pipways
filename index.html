<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways | Institutional Trader Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Glass Effects */
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-strong {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradients */
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Chart Pattern Background */
        .chart-bg {
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Hover Effects */
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        /* Status Indicators */
        .status-long { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-short { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-neutral { background: rgba(148, 163, 184, 0.2); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

        /* Input Focus */
        .input-focus:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>

    <!-- ==================== JAVASCRIPT ==================== -->
    <script>
        // API Configuration
        const API_URL = 'https://pipways-api.onrender.com';

        // State Management
        let authToken = localStorage.getItem('pipways_token');
        let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');
        let currentPage = 'dashboard';

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            if (authToken && currentUser.id) {
                showApp();
            } else {
                showAuth();
            }
            lucide.createIcons();
        });

        // ==================== AUTHENTICATION ====================
        function showAuth() {
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('app').classList.add('hidden');
        }

        function showApp() {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');

            // Update user info
            if (currentUser.name) {
                document.getElementById('sidebar-name').textContent = currentUser.name;
            }
            if (currentUser.email) {
                document.getElementById('sidebar-email').textContent = currentUser.email;
            }

            // Show admin nav if applicable
            if (currentUser.is_admin) {
                document.getElementById('admin-nav').classList.remove('hidden');
            }

            navigate('dashboard');
        }

        function switchAuthTab(tab) {
            const loginBtn = document.getElementById('tab-login');
            const registerBtn = document.getElementById('tab-register');
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');

            // Hide messages
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-success').classList.add('hidden');

            if (tab === 'login') {
                loginBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-blue-500 text-white shadow-lg';
                registerBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
                loginForm.classList.remove('hidden');
                registerForm.classList.add('hidden');
            } else {
                registerBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all bg-emerald-500 text-white shadow-lg';
                loginBtn.className = 'flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all text-slate-400 hover:text-white';
                registerForm.classList.remove('hidden');
                loginForm.classList.add('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');

            // Loading state
            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
            errorEl.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('username', form.email.value);
                formData.append('password', form.password.value);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || data.message || 'Login failed');
                }

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                localStorage.setItem('pipways_user', JSON.stringify(data));

                successEl.querySelector('span').textContent = 'Welcome back! Redirecting...';
                successEl.classList.remove('hidden');

                setTimeout(() => showApp(), 800);

            } catch (err) {
                errorEl.querySelector('span').textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('register-btn');
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');

            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
            errorEl.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('name', form.name.value);
                formData.append('email', form.email.value);
                formData.append('password', form.password.value);

                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || data.message || 'Registration failed');
                }

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                localStorage.setItem('pipways_user', JSON.stringify(data));

                successEl.querySelector('span').textContent = 'Account created! Redirecting...';
                successEl.classList.remove('hidden');

                setTimeout(() => showApp(), 800);

            } catch (err) {
                errorEl.querySelector('span').textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            authToken = null;
            currentUser = {};
            showAuth();
        }

        // ==================== API HELPERS ====================
        async function api(endpoint, options = {}) {
            const url = `${API_URL}${endpoint}`;
            const config = {
                headers: {
                    'Authorization': `Bearer ${authToken}`,
                    ...options.headers
                },
                ...options
            };

            const response = await fetch(url, config);

            if (response.status === 401) {
                logout();
                throw new Error('Session expired');
            }

            return response;
        }

        async function submitTrade(e) {

            const originalHTML = btn.innerHTML;

            btn.innerHTML = '<div class="spinner"></div> Saving...';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('pair', form.pair.value.toUpperCase());
                formData.append('direction', form.direction.value);
                formData.append('pips', form.pips.value);
                formData.append('grade', form.grade.value);

                const response = await api('/trades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (!response.ok) {

                    throw new Error(err.detail || 'Failed to save trade');

                btn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i> Saved Successfully!';
                btn.classList.remove('from-emerald-500', 'to-teal-500');
                btn.classList.add('bg-emerald-600');
                form.reset();

                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.classList.add('from-emerald-500', 'to-teal-500');
                    btn.classList.remove('bg-emerald-600');
                    btn.disabled = false;

                result.classList.remove('hidden');

                    throw new Error(data.detail || 'Analysis failed');

                const a = data.analysis;
                const scoreColor = a.trader_score >= 80 ? 'from-emerald-500 to-teal-500' : a.trader_score >= 60 ? 'from-blue-500 to-violet-500' : 'from-orange-500 to-red-500';

            // Add user message

            chatContainer.innerHTML += `

                document.getElementById(typingId).remove();
                chatContainer.innerHTML += `

                `;
            }

            lucide.createIcons();
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        async function loadBlogPosts(category = 'all', search = '') {
            try {
                let url = '/blog/posts?status=published&per_page=12';
                if (category !== 'all') url += `&category=${encodeURIComponent(category)}`;
                if (search) url += `&search=${encodeURIComponent(search)}`;

                const response = await fetch(`${API_URL}${url}`);
                const data = await response.json();

                const grid = document.getElementById('blog-grid');

                if (!data.posts || data.posts.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">
                            <i data-lucide="file-text" class="w-16 h-16 text-slate-600 mx-auto mb-4"></i>
                            <h3 class="text-xl font-bold text-white mb-2">No Articles Found</h3>
                            <p class="text-slate-400">Try a different search or category</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = data.posts.map(p => `
                    <article class="glass rounded-2xl overflow-hidden hover-lift cursor-pointer group" onclick="viewBlogPost('${p.slug}')">
                        ${p.featured_image ? 
                            `<div class="h-48 bg-cover bg-center" style="background-image: url('${p.featured_image}')"></div>` :
                            `<div class="h-48 bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center">
                                <i data-lucide="image" class="w-12 h-12 text-slate-600"></i>

                                <span class="text-xs text-slate-500">${new Date(p.published_at).toLocaleDateString()}</span>
                            </div>
                            <h3 class="text-lg font-bold text-white mb-2 line-clamp-2 group-hover:text-indigo-400 transition-colors">${p.title}</h3>
                            <p class="text-slate-400 text-sm line-clamp-3 mb-4">${p.excerpt || p.content.substring(0, 150) + '...'}</p>
                            <div class="flex items-center justify-between text-sm">
                                <span class="text-slate-500 flex items-center gap-1">
                                    <i data-lucide="eye" class="w-4 h-4"></i> ${p.view_count || 0}

                document.getElementById('blog-grid').innerHTML = `

                        Error loading articles: ${err.message}
                    </div>
                `;

        }

        function filterBlog(category) {
            // Update button styles
            const buttons = document.querySelectorAll('#blog-grid').previousElementSibling.querySelectorAll('button');
            buttons.forEach(btn => {
                if (btn.textContent.toLowerCase().includes(category.replace('-', ' ')) || (category === 'all' && btn.textContent === 'All')) {
                    btn.className = 'px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold whitespace-nowrap';
                } else {
                    btn.className = 'px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg text-sm whitespace-nowrap';
                }
            });

            loadBlogPosts(category);
        }

        function searchBlog() {
            const search = document.getElementById('blog-search').value;
            loadBlogPosts('all', search);

                const webinarCount = webinars.length || 0;

        async function submitBlogPost(e) {
            e.preventDefault();
            const form = e.target;

            try {
                const formData = new URLSearchParams();
                formData.append('title', form.title.value);
                formData.append('content', form.content.value);
                formData.append('category', form.category.value);
                formData.append('status', form.status.value);
                if (form.excerpt.value) formData.append('excerpt', form.excerpt.value);

                const response = await api('/admin/blog/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (response.ok) {
                    alert('Post created successfully!');
                    showAdminSection('blog');
                } else {
                    const err = await response.json();
                    throw new Error(err.detail || 'Failed to create post');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }

        async function deleteBlogPost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;

            try {
                const response = await api(`/admin/blog/posts/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showAdminSection('blog');
                } else {
                    throw new Error('Failed to delete');
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
