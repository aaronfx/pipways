    <style>
        * { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes pulse-glow { 0%, 100% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); } 50% { box-shadow: 0 0 40px rgba(59, 130, 246, 0.6); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }

        .animate-fade-in { animation: fadeIn 0.5s ease-out; }
        .animate-slide-in { animation: slideIn 0.4s ease-out; }
        .animate-pulse-glow { animation: pulse-glow 2s infinite; }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        /* Glass Effects */
        .glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-strong {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Gradients */
        .gradient-text {
            background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1));
        }
        .gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #ec4899);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Chart Pattern Background */
        .chart-bg {
            background-image: 
                linear-gradient(rgba(59, 130, 246, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(59, 130, 246, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
        }

        /* Hover Effects */
        .hover-lift {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .hover-lift:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
        }

        /* Status Indicators */
        .status-long { background: rgba(16, 185, 129, 0.2); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-short { background: rgba(239, 68, 68, 0.2); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .status-neutral { background: rgba(148, 163, 184, 0.2); color: #94a3b8; border: 1px solid rgba(148, 163, 184, 0.3); }

        /* Input Focus */
        .input-focus:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Hide scrollbar for clean UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mobile Responsive */
        @media (max-width: 1024px) {
            #sidebar { transform: translateX(-100%); transition: transform 0.3s ease; }
            #sidebar.open { transform: translateX(0); }
            #main-content { margin-left: 0; }
            .mobile-overlay { display: block; }
        }
        @media (min-width: 1025px) {
            .mobile-overlay { display: none; }
        }

        /* Toast Notifications */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 16px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            max-width: 400px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: rgba(16, 185, 129, 0.9); }
        .toast.error { background: rgba(239, 68, 68, 0.9); }
        .toast.info { background: rgba(59, 130, 246, 0.9); }

        /* SEO Score Badge */
        .seo-score { 
            display: inline-flex; 
            align-items: center; 
            gap: 4px; 
            padding: 4px 12px; 
            border-radius: 20px; 
            font-size: 12px; 
            font-weight: 600; 
        }
        .seo-score.good { background: rgba(16, 185, 129, 0.2); color: #34d399; }
        .seo-score.medium { background: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .seo-score.poor { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* Pagination */
        .pagination-btn {
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            transition: all 0.2s;
        }
        .pagination-btn:hover:not(:disabled) {
            background: rgba(59, 130, 246, 0.2);
            color: white;
        }
        .pagination-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-btn.active { background: #3b82f6; color: white; }
    </style>

    <script>
        // API Configuration
        const API_URL = 'https://pipways-api.onrender.com';
        const REQUEST_TIMEOUT = 30000; // 30 seconds

        // State Management
        let authToken = localStorage.getItem('pipways_token');
        let currentUser = JSON.parse(localStorage.getItem('pipways_user') || '{}');
        let currentPage = 'dashboard';
        let paginationState = { page: 1, perPage: 10, total: 0 };

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            if (authToken && currentUser.id) {
                showApp();
            } else {
                showAuth();
            }
            lucide.createIcons();

        // ==================== UTILITY FUNCTIONS ====================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            const date = new Date(dateString);
            return date.toLocaleDateString('en-US', { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatNumber(num, decimals = 1) {
            if (num === null || num === undefined) return '0';
            return parseFloat(num).toFixed(decimals);
        }

        function showToast(message, type = 'info', duration = 3000) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <div class="flex items-center gap-2">
                    <i data-lucide="${type === 'success' ? 'check-circle' : type === 'error' ? 'alert-circle' : 'info'}" class="w-5 h-5"></i>
                    <span>${escapeHtml(message)}</span>
                </div>
            `;
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => toast.classList.add('show'), 100);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, duration);
        }

            overlay.classList.toggle('hidden');

        // ==================== API HELPERS ====================
        async function api(endpoint, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT);

            try {
                const url = `${API_URL}${endpoint}`;
                const config = {
                    ...options,
                    headers: {
                        'Authorization': `Bearer ${authToken}`,
                        ...options.headers
                    },
                    signal: controller.signal
                };

                const response = await fetch(url, config);
                clearTimeout(timeoutId);

                if (response.status === 401) {
                    logout();
                    throw new Error('Session expired. Please login again.');
                }

                if (!response.ok) {
                    const err = await response.json().catch(() => ({}));
                    throw new Error(err.detail || err.message || `HTTP ${response.status}`);
                }

                return response;
            } catch (err) {
                clearTimeout(timeoutId);
                if (err.name === 'AbortError') {
                    throw new Error('Request timeout. Please try again.');
                }
                throw err;
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('login-btn');
            const errorEl = document.getElementById('auth-error');
            const successEl = document.getElementById('auth-success');

            const originalContent = btn.innerHTML;
            btn.innerHTML = '<div class="spinner"></div>';
            btn.disabled = true;
            errorEl.classList.add('hidden');

            try {
                const formData = new URLSearchParams();
                formData.append('username', form.email.value);
                formData.append('password', form.password.value);

                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }

                authToken = data.access_token;
                currentUser = data;
                localStorage.setItem('pipways_token', authToken);
                localStorage.setItem('pipways_user', JSON.stringify(data));

                successEl.querySelector('span').textContent = 'Welcome back! Redirecting...';
                successEl.classList.remove('hidden');

                setTimeout(() => showApp(), 800);

            } catch (err) {
                errorEl.querySelector('span').textContent = err.message;
                errorEl.classList.remove('hidden');
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');

        async function loadUserInsights() {
            try {
                const response = await api('/mentor/insights');
                const data = await response.json();

                if (data.trader_type) {
                    const level = calculateLevel(data);
                    document.getElementById('trader-level').textContent = level;
                    document.getElementById('level-progress').style.width = `${(level / 10) * 100}%`;
                }
            } catch (err) {
                console.log('No insights yet');
            }
        }

        function calculateLevel(data) {
            let score = 0;
            if (data.personality_profile?.score) score += parseInt(data.personality_profile.score) / 10;
            return Math.min(Math.max(Math.floor(score), 1), 10);
        }

        async function submitTrade(e) {
            e.preventDefault();
            const form = e.target;
            const btn = document.getElementById('submit-trade-btn');
            const originalHTML = btn.innerHTML;

            btn.innerHTML = '<div class="spinner"></div> Saving...';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('pair', form.pair.value.toUpperCase());
                formData.append('direction', form.direction.value);
                formData.append('pips', form.pips.value);
                formData.append('grade', form.grade.value);

                const response = await api('/trades', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Failed to save trade');
                }

                showToast('Trade saved successfully!', 'success');
                form.reset();
                loadTrades();

            } catch (err) {
                showToast(err.message, 'error');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

            input.value = '';

            // Show typing indicator

            const typingId = 'typing-' + Date.now();
            container.innerHTML += `
                <div id="${typingId}" class="flex gap-3">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-br from-pink-500 to-violet-500 flex items-center justify-center flex-shrink-0">

            container.scrollTop = container.scrollHeight;

            try {
                const formData = new URLSearchParams();
                formData.append('message', message);

                const response = await api('/mentor/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                document.getElementById(typingId).remove();

                if (data.success) {

                    throw new Error(data.error || 'Failed to get response');

        let searchDebounceTimer;
        function debounceSearchBlog() {
            clearTimeout(searchDebounceTimer);

        function filterBlog(category) {
            currentBlogCategory = category;
            paginationState.page = 1;

            // Update button styles
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.category === category) {
                    btn.className = 'filter-btn px-4 py-2 bg-blue-500 text-white rounded-lg text-sm font-semibold whitespace-nowrap';
                } else {
                    btn.className = 'filter-btn px-4 py-2 bg-slate-800 text-slate-300 hover:bg-slate-700 rounded-lg text-sm whitespace-nowrap';
                }
            });

            loadBlogPosts();
        }

        function changeBlogPage(direction) {
            const newPage = paginationState.page + direction;
            if (newPage < 1 || newPage > Math.ceil(paginationState.total / paginationState.perPage)) return;

            paginationState.page = newPage;
            loadBlogPosts();
            document.getElementById('blog-grid').scrollIntoView({ behavior: 'smooth' });
        }

        async function loadBlogPosts() {
            const grid = document.getElementById('blog-grid');
            grid.innerHTML = '<div class="col-span-full flex items-center justify-center py-12"><div class="spinner"></div></div>';

            try {
                let url = `/blog/posts?status=published&page=${paginationState.page}&per_page=${paginationState.perPage}`;
                if (currentBlogCategory !== 'all') url += `&category=${encodeURIComponent(currentBlogCategory)}`;
                if (currentBlogSearch) url += `&search=${encodeURIComponent(currentBlogSearch)}`;

                const response = await fetch(`${API_URL}${url}`);
                const data = await response.json();

                if (!data.posts || data.posts.length === 0) {
                    grid.innerHTML = `
                        <div class="col-span-full text-center py-12">

                        </div>
                    `;
                    document.getElementById('blog-pagination').classList.add('hidden');
                    return;
                }

                paginationState.total = data.total;

                grid.innerHTML = data.posts.map(p => `
                    <article class="glass rounded-2xl overflow-hidden hover-lift cursor-pointer group" onclick="viewBlogPost('${escapeHtml(p.slug)}')">
                        ${p.featured_image ?

                                <span class="text-indigo-400 font-semibold">Read more →</span>
                            </div>
                        </div>
                    </article>
                `).join('');

                // Update pagination
                const totalPages = Math.ceil(data.total / data.per_page);
                const paginationEl = document.getElementById('blog-pagination');

                            <div class="flex items-center justify-between p-4 bg-slate-800/30 rounded-xl">

                                    <div class="font-semibold text-white truncate">${escapeHtml(p.title)}</div>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="px-2 py-0.5 bg-slate-700 rounded text-xs text-slate-400">${escapeHtml(p.status)}</span>
                                        <span class="text-xs text-slate-500">${escapeHtml(p.category || 'General')}</span>
                                        <span class="text-xs text-slate-600">•</span>
                                        <span class="text-xs text-slate-500">${formatDate(p.published_at).split(',')[0]}</span>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    ${p.seo_score ? `
                                        <span class="seo-score ${p.seo_score >= 80 ? 'good' : p.seo_score >= 60 ? 'medium' : 'poor'}">
                                            SEO: ${p.seo_score}
                                        </span>
                                    ` : ''}
                                    <button onclick="deleteBlogPost(${p.id})" class="p-2 text-red-400 hover:bg-red-500/10 rounded-lg transition-colors" title="Delete">
                                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                                    </button>
                                </div>
                            </div>
                        `).join('') : '<p class="text-slate-500 text-center py-4">No posts found</p>'}
                    </div>
                `;
            } catch (err) {
                container.innerHTML = `<div class="text-red-400">Error: ${escapeHtml(err.message)}</div>`;
            }
            lucide.createIcons();
        }

        function createBlogPost() {
            const content = document.getElementById('admin-content');
            content.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Create New Blog Post</h3>
                    <button onclick="showAdminSection('blog')" class="text-slate-400 hover:text-white">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <form onsubmit="submitBlogPost(event)" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Title *</label>
                        <input type="text" name="title" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus">
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="text-sm text-slate-400 mb-1 block">Category</label>
                            <select name="category" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus">
                                <option value="strategy">Strategy</option>
                                <option value="psychology">Psychology</option>
                                <option value="risk-management">Risk Management</option>
                                <option value="technical-analysis">Technical Analysis</option>
                                <option value="fundamental-analysis">Fundamental Analysis</option>
                                <option value="news">News</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-sm text-slate-400 mb-1 block">Status</label>
                            <select name="status" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus">
                                <option value="draft">Draft</option>
                                <option value="published">Published</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Content *</label>
                        <textarea name="content" rows="8" required class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus" placeholder="Write your article content here..."></textarea>
                    </div>
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Excerpt (optional)</label>
                        <input type="text" name="excerpt" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus" placeholder="Brief summary of the article">
                    </div>
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Featured Image</label>
                        <div class="flex gap-2">
                            <input type="text" name="featured_image" class="flex-1 bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus" placeholder="Image URL">
                            <input type="file" name="featured_image_upload" accept="image/*" class="hidden" id="blog-image-upload" onchange="handleBlogImageUpload(this)">
                            <button type="button" onclick="document.getElementById('blog-image-upload').click()" class="px-4 py-2 bg-slate-700 hover:bg-slate-600 rounded-xl text-white text-sm">
                                Upload
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="text-sm text-slate-400 mb-1 block">Meta Description (for SEO)</label>
                        <input type="text" name="meta_description" maxlength="160" class="w-full bg-slate-800/50 border border-slate-700 rounded-xl px-4 py-3 text-white input-focus" placeholder="150-160 characters for search engines">
                        <p class="text-xs text-slate-500 mt-1">Recommended: 150-160 characters</p>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button type="submit" class="flex-1 py-3 bg-blue-500 hover:bg-blue-600 rounded-xl text-white font-semibold">
                            Save Post
                        </button>
                        <button type="button" onclick="showAdminSection('blog')" class="px-6 py-3 bg-slate-700 hover:bg-slate-600 rounded-xl text-white">
                            Cancel
                        </button>
                    </div>
                </form>
            `;
            lucide.createIcons();
        }

        async function handleBlogImageUpload(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];
            if (file.size > 5 * 1024 * 1024) {
                showToast('Image too large. Max 5MB.', 'error');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await api('/admin/media/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    document.querySelector('input[name="featured_image"]').value = data.url;
                    showToast('Image uploaded successfully!', 'success');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function submitBlogPost(e) {
            e.preventDefault();
            const form = e.target;
            const btn = form.querySelector('button[type="submit"]');
            btn.innerHTML = '<div class="spinner inline-block mr-2"></div> Saving...';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('title', form.title.value);
                formData.append('content', form.content.value);
                formData.append('category', form.category.value);
                formData.append('status', form.status.value);
                if (form.excerpt.value) formData.append('excerpt', form.excerpt.value);
                if (form.featured_image.value) formData.append('featured_image', form.featured_image.value);
                if (form.meta_description.value) formData.append('meta_description', form.meta_description.value);

                const response = await api('/admin/blog/posts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    showToast(`Post created! SEO Score: ${data.seo_score}/100`, 'success');
                    showAdminSection('blog');
                } else {
                    throw new Error(data.message || 'Failed to create post');
                }
            } catch (err) {
                showToast(err.message, 'error');
                btn.innerHTML = 'Save Post';
                btn.disabled = false;
            }
        }

        async function deleteBlogPost(id) {
            if (!confirm('Are you sure you want to delete this post?')) return;

            try {
                const response = await api(`/admin/blog/posts/${id}`, { method: 'DELETE' });
                if (response.ok) {
                    showToast('Post deleted', 'success');
                    showAdminSection('blog');
                } else {
                    throw new Error('Failed to delete');
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        async function renderAdminWebinars(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Manage Webinars</h3>
                    <button onclick="document.getElementById('admin-content').classList.add('hidden')" class="text-slate-400 hover:text-white">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-slate-400">Webinar management coming soon. Use API directly for now.</p>
            `;
        }

        async function renderAdminCourses(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Manage Courses</h3>
                    <button onclick="document.getElementById('admin-content').classList.add('hidden')" class="text-slate-400 hover:text-white">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-slate-400">Course management coming soon. Use API directly for now.</p>
            `;
        }

        async function renderAdminMedia(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Media Library</h3>
                    <div class="flex gap-2">
                        <input type="file" id="media-upload" class="hidden" accept="image/*" onchange="uploadMedia(this)">
                        <button onclick="document.getElementById('media-upload').click()" class="px-4 py-2 bg-blue-500 hover:bg-blue-600 rounded-lg text-white text-sm font-semibold">
                            + Upload
                        </button>
                        <button onclick="document.getElementById('admin-content').classList.add('hidden')" class="text-slate-400 hover:text-white">
                            <i data-lucide="x" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                <div id="media-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 max-h-96 overflow-y-auto">
                    <div class="col-span-full flex justify-center py-8"><div class="spinner"></div></div>
                </div>
            `;
            loadMediaFiles();
        }

        async function loadMediaFiles() {
            try {
                const response = await api('/admin/media?file_type=image');
                const files = await response.json();

                const grid = document.getElementById('media-grid');
                if (files && files.length > 0) {
                    grid.innerHTML = files.map(f => `
                        <div class="aspect-square rounded-xl bg-slate-800/50 overflow-hidden relative group cursor-pointer" onclick="copyMediaUrl('${escapeHtml(f.url)}')">
                            <img src="${escapeHtml(f.url)}" alt="${escapeHtml(f.filename)}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <i data-lucide="copy" class="w-6 h-6 text-white"></i>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = '<p class="col-span-full text-center text-slate-500 py-8">No media files</p>';
                }
            } catch (err) {
                document.getElementById('media-grid').innerHTML = `<p class="col-span-full text-center text-red-400 py-8">${escapeHtml(err.message)}</p>`;
            }
            lucide.createIcons();
        }

        async function uploadMedia(input) {
            if (!input.files || !input.files[0]) return;

            const file = input.files[0];
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await api('/admin/media/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.success) {
                    showToast('Media uploaded!', 'success');
                    loadMediaFiles();
                }
            } catch (err) {
                showToast(err.message, 'error');
            }
        }

        function copyMediaUrl(url) {
            navigator.clipboard.writeText(url);
            showToast('URL copied!', 'success');
        }

        async function renderAdminAnalytics(container) {
            container.innerHTML = `
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold text-white">Platform Analytics</h3>
                    <button onclick="document.getElementById('admin-content').classList.add('hidden')" class="text-slate-400 hover:text-white">
                        <i data-lucide="x" class="w-5 h-5"></i>
                    </button>
                </div>
                <p class="text-slate-400">Detailed analytics coming soon.</p>
            `;
        }

        // ==================== NOTIFICATIONS ====================
        function showNotifications() {
            showToast('No new notifications', 'info');
        }
    </script>
</body>
</html>
