<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Pipways</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <h1>Pipways</h1>
        </div>
        <div class="nav-links">
            <a href="#/dashboard" class="nav-link active">Home</a>
            <a href="#/signals" class="nav-link">Signals</a>
            <a href="#/courses" class="nav-link">Courses</a>
            <a href="#/blog" class="nav-link">Blog</a>
            <a href="#/webinars" class="nav-link">Webinars</a>
            <div class="nav-dropdown">
                <a href="#/ai-tools" class="nav-link">AI Tools ▼</a>
                <div class="dropdown-content">
                    <a href="#/ai-mentor">AI Mentor</a>
                    <a href="#/chart-analysis">Chart Analysis</a>
                    <a href="#/performance">Performance</a>
                </div>
            </div>
            <a href="#/admin" class="nav-link" id="adminLink" style="display:none">Admin</a>
        </div>
        <div class="nav-user">
            <span id="userEmail" style="margin-right: 1rem; color: var(--gray-300);"></span>
            <button onclick="logout()" class="btn btn-secondary btn-sm">Logout</button>
        </div>
    </nav>

    <main id="app" style="padding: 2rem; max-width: 1280px; margin: 0 auto; min-height: calc(100vh - 80px);"></main>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Core -->
    <script src="/static/js/store.js"></script>
    <script src="/static/js/api.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/router.js"></script>
    
    <!-- Modules -->
    <script src="/static/js/modules/dashboard.js"></script>
    <script src="/static/js/modules/signals.js"></script>
    <script src="/static/js/modules/courses.js"></script>
    <script src="/static/js/modules/blog.js"></script>
    <script src="/static/js/modules/webinars.js"></script>
    <script src="/static/js/modules/ai_mentor.js"></script>
    <script src="/static/js/modules/chart_analysis.js"></script>
    <script src="/static/js/modules/performance.js"></script>
    <script src="/static/js/modules/admin.js"></script>
    
    <script>
        // Check auth
        if (!localStorage.getItem('pipways_token')) {
            window.location.href = '/';
        }
        
        // Show user
        const user = JSON.parse(localStorage.getItem('pipways_user') || '{}');
        document.getElementById('userEmail').textContent = user.email || '';
        if (user.is_admin) {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
        
        function logout() {
            localStorage.removeItem('pipways_token');
            localStorage.removeItem('pipways_user');
            window.location.href = '/';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            UI.init();
            Router.init();
        });
    </script>
</body>
</html>
