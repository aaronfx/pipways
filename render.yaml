services:
  - type: web
    name: pipways-web
    runtime: python
    plan: starter              # ← Changed from free to starter
    branch: main               # ← Added explicit branch

    buildCommand: |
      python --version
      pip install --upgrade pip setuptools wheel  # ← Prevents build errors
      pip install -r requirements.txt

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0          # ← Forces Python 3.11 (fixes 3.14 issue)

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"          # ← Quoted (string format)

      - key: MAX_FILE_SIZE
        value: "10485760"      # ← Quoted (string format)

    previews:
      generation: automatic     # ← Pro feature enabled

databases:
  - name: pipways-db
    plan: starter              # ← Upgraded from free
