<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipways Trading Platform</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav id="navbar" class="navbar">
        <div class="nav-brand">
            <h1>Pipways</h1>
        </div>
        <div class="nav-links" id="navLinks">
            <a href="#/" class="nav-link">Home</a>
            <a href="#/signals" class="nav-link">Signals</a>
            <a href="#/courses" class="nav-link">Courses</a>
            <a href="#/blog" class="nav-link">Blog</a>
            <a href="#/webinars" class="nav-link">Webinars</a>
            <a href="#/dashboard" class="nav-link" id="dashboardLink" style="display:none">Dashboard</a>
            <a href="#/admin" class="nav-link" id="adminLink" style="display:none">Admin</a>
        </div>
        <div class="nav-auth" id="authSection">
            <button id="loginBtn" class="btn btn-primary">Login</button>
            <button id="registerBtn" class="btn btn-secondary">Register</button>
            <div id="userMenu" style="display:none">
                <span id="userName"></span>
                <button id="logoutBtn" class="btn btn-text">Logout</button>
            </div>
        </div>
    </nav>

    <main id="app" class="container"></main>

    <div id="toastContainer" class="toast-container"></div>
    <div id="loadingSpinner" class="spinner-overlay" style="display:none">
        <div class="spinner"></div>
    </div>

    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/router.js"></script>

    <script src="js/modules/signals.js"></script>
    <script src="js/modules/courses.js"></script>
    <script src="js/modules/blog.js"></script>
    <script src="js/modules/webinars.js"></script>
    <script src="js/modules/media.js"></script>
    <script src="js/modules/dashboard.js"></script>
    <script src="js/modules/admin.js"></script>
    <script src="js/modules/risk_calculator.js"></script>
    <script src="js/modules/blog_enhanced.js"></script>
    <script src="js/modules/quiz.js"></script>
    <script src="js/modules/notifications.js"></script>

    <script src="js/app.js"></script>
</body>
</html>
